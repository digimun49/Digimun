<!DOCTYPE html>
<html lang="en">
<head>
  <title>My Profile | Digimun Pro</title>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="description" content="View and manage your Digimun Pro account profile, status, and settings." />
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" type="image/png" href="assets/digimun-favicon.png">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="global-loader.css">
  <script src="global-loader.js"></script>

  <style>
    :root {
      --bg-primary: #050508;
      --bg-secondary: #0a0e14;
      --bg-card: #111827;
      --bg-card-hover: #1a2332;
      --accent: #00D4AA;
      --accent-dark: #00b894;
      --accent-glow: rgba(0, 212, 170, 0.08);
      --text-primary: #ffffff;
      --text-secondary: #9ca3af;
      --text-muted: #6b7280;
      --border: rgba(255, 255, 255, 0.08);
      --border-accent: rgba(0, 212, 170, 0.20);
      --danger: #ef4444;
      --warning: #f59e0b;
      --success: #10b981;
      --gradient-accent: linear-gradient(135deg, #00D4AA 0%, #00b894 100%);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      line-height: 1.6;
      min-height: 100vh;
    }

    .top-nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 56px;
      background: rgba(5, 5, 8, 0.92);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      z-index: 1000;
    }

    .nav-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 40px;
      height: 40px;
      border: none;
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.05);
      color: var(--text-secondary);
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .nav-btn:hover {
      background: rgba(255, 255, 255, 0.08);
      color: var(--text-primary);
    }

    .nav-btn svg {
      width: 20px;
      height: 20px;
      fill: currentColor;
    }

    .nav-title {
      font-size: 16px;
      font-weight: 700;
      color: var(--text-primary);
      letter-spacing: -0.3px;
    }

    .main-content {
      padding: 72px 16px 40px;
      max-width: 800px;
      margin: 0 auto;
    }

    .profile-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 20px;
    }

    .profile-header-card {
      display: flex;
      align-items: flex-start;
      gap: 20px;
      flex-wrap: wrap;
    }

    .profile-avatar {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent-dark) 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      font-weight: 700;
      color: #000;
      flex-shrink: 0;
      border: 2px solid rgba(0, 212, 170, 0.3);
    }

    .profile-info {
      flex: 1;
      min-width: 200px;
    }

    .profile-name {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 2px;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .profile-email {
      font-size: 14px;
      color: var(--text-muted);
      margin-bottom: 10px;
      word-break: break-all;
    }

    .profile-meta-row {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }

    .tier-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .tier-badge.vip {
      color: var(--accent);
      background: rgba(0, 212, 170, 0.1);
      border: 1px solid rgba(0, 212, 170, 0.25);
    }

    .tier-badge.standard {
      color: var(--text-secondary);
      background: rgba(156, 163, 175, 0.1);
      border: 1px solid rgba(156, 163, 175, 0.2);
    }

    .verification-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 12px;
      font-weight: 500;
    }

    .verification-badge.verified {
      color: var(--success);
    }

    .verification-badge.unverified {
      color: var(--warning);
    }

    .verification-badge svg {
      width: 14px;
      height: 14px;
      fill: currentColor;
    }

    .member-since {
      font-size: 12px;
      color: var(--text-muted);
    }

    .edit-profile-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 18px;
      border-radius: 10px;
      background: var(--gradient-accent);
      color: #000;
      font-size: 13px;
      font-weight: 600;
      border: none;
      cursor: pointer;
      transition: all 0.2s ease;
      margin-top: 4px;
    }

    .edit-profile-btn:hover {
      box-shadow: 0 4px 16px rgba(0, 212, 170, 0.3);
      transform: translateY(-1px);
    }

    .edit-profile-btn svg {
      width: 14px;
      height: 14px;
      fill: currentColor;
    }

    .section-label {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--text-primary);
    }

    .section-label svg {
      width: 18px;
      height: 18px;
      fill: var(--accent);
    }

    .status-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
    }

    .status-item {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px;
      transition: border-color 0.2s ease;
    }

    .status-item:hover {
      border-color: rgba(255, 255, 255, 0.12);
    }

    .status-item-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }

    .status-item-icon {
      width: 28px;
      height: 28px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .status-item-icon svg {
      width: 14px;
      height: 14px;
      fill: currentColor;
    }

    .status-item-icon.green { background: rgba(16, 185, 129, 0.12); color: var(--success); }
    .status-item-icon.yellow { background: rgba(245, 158, 11, 0.12); color: var(--warning); }
    .status-item-icon.blue { background: rgba(59, 130, 246, 0.12); color: #3b82f6; }
    .status-item-icon.purple { background: rgba(124, 58, 237, 0.12); color: #7c3aed; }
    .status-item-icon.cyan { background: rgba(0, 212, 170, 0.12); color: var(--accent); }
    .status-item-icon.red { background: rgba(239, 68, 68, 0.12); color: var(--danger); }

    .status-item-label {
      font-size: 12px;
      color: var(--text-muted);
      font-weight: 500;
    }

    .status-item-value {
      margin-top: 4px;
    }

    .contact-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .contact-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 14px;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 10px;
    }

    .contact-item-icon {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .contact-item-icon svg {
      width: 18px;
      height: 18px;
      fill: currentColor;
    }

    .contact-item-icon.telegram { background: rgba(0, 136, 204, 0.12); color: #0088cc; }
    .contact-item-icon.whatsapp { background: rgba(37, 211, 102, 0.12); color: #25d366; }
    .contact-item-icon.phone { background: rgba(59, 130, 246, 0.12); color: #3b82f6; }

    .contact-item-text {
      flex: 1;
    }

    .contact-item-label {
      font-size: 12px;
      color: var(--text-muted);
      font-weight: 500;
    }

    .contact-item-value {
      font-size: 14px;
      color: var(--text-primary);
      font-weight: 500;
    }

    .contact-item-value.not-provided {
      color: var(--text-muted);
      font-style: italic;
    }

    .activity-list {
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .activity-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 0;
      border-bottom: 1px solid var(--border);
    }

    .activity-item:last-child {
      border-bottom: none;
    }

    .activity-label {
      font-size: 13px;
      color: var(--text-muted);
      font-weight: 500;
    }

    .activity-value {
      font-size: 13px;
      color: var(--text-primary);
      font-weight: 500;
      text-align: right;
    }

    .activity-value.uid {
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 12px;
      color: var(--text-secondary);
    }

    .quick-actions-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
    }

    .quick-action-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 12px 14px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 600;
      text-decoration: none;
      cursor: pointer;
      border: 1px solid var(--border);
      background: var(--bg-secondary);
      color: var(--text-secondary);
      transition: all 0.2s ease;
      font-family: 'Inter', sans-serif;
    }

    .quick-action-btn:hover {
      background: rgba(255, 255, 255, 0.04);
      border-color: rgba(255, 255, 255, 0.12);
      color: var(--text-primary);
    }

    .quick-action-btn svg {
      width: 16px;
      height: 16px;
      fill: currentColor;
    }

    .quick-action-btn.primary {
      background: var(--gradient-accent);
      color: #000;
      border: none;
    }

    .quick-action-btn.primary:hover {
      box-shadow: 0 4px 16px rgba(0, 212, 170, 0.25);
      transform: translateY(-1px);
    }

    .quick-action-btn.primary svg {
      fill: #000;
    }

    .login-prompt {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 60px 24px;
      min-height: 60vh;
    }

    .login-prompt-icon {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 20px;
    }

    .login-prompt-icon svg {
      width: 28px;
      height: 28px;
      fill: var(--text-muted);
    }

    .login-prompt h2 {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .login-prompt p {
      color: var(--text-muted);
      font-size: 14px;
      margin-bottom: 24px;
    }

    .login-prompt-btns {
      display: flex;
      gap: 10px;
    }

    .login-prompt-btns a {
      padding: 10px 24px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      text-decoration: none;
      transition: all 0.2s ease;
    }

    .login-prompt-btns .btn-login {
      background: var(--gradient-accent);
      color: #000;
    }

    .login-prompt-btns .btn-signup {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--border);
      color: var(--text-secondary);
    }

    .profile-content {
      display: none;
    }

    .loading-skeleton {
      display: none;
    }

    .loading-skeleton.visible {
      display: block;
    }

    .skeleton-line {
      height: 14px;
      border-radius: 6px;
      background: linear-gradient(90deg, rgba(255,255,255,0.04) 0%, rgba(255,255,255,0.08) 50%, rgba(255,255,255,0.04) 100%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
      margin-bottom: 10px;
    }

    .skeleton-line.w60 { width: 60%; }
    .skeleton-line.w40 { width: 40%; }
    .skeleton-line.w80 { width: 80%; }
    .skeleton-line.h20 { height: 20px; }
    .skeleton-line.h40 { height: 40px; }

    .skeleton-avatar {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: linear-gradient(90deg, rgba(255,255,255,0.04) 0%, rgba(255,255,255,0.08) 50%, rgba(255,255,255,0.04) 100%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
    }

    .skeleton-header {
      display: flex;
      gap: 20px;
      align-items: flex-start;
    }

    .skeleton-info {
      flex: 1;
    }

    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    @media (min-width: 640px) {
      .main-content {
        padding: 80px 24px 48px;
      }
      .status-grid {
        grid-template-columns: repeat(3, 1fr);
      }
    }

    @media (max-width: 400px) {
      .profile-header-card {
        flex-direction: column;
        align-items: center;
        text-align: center;
      }
      .profile-name {
        justify-content: center;
      }
      .profile-meta-row {
        justify-content: center;
      }
      .quick-actions-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

    function goBack() {
      if (window.history.length > 1) {
        window.history.back();
      } else {
        window.location.href = '/';
      }
    }

      projectId: "digimun-49",
      storageBucket: "digimun-49.firebasestorage.app",
      messagingSenderId: "843475027498",
      appId: "1:843475027498:web:b380ddf6d10537a3ef86f5"
    };

    const app = initializeApp(firebaseConfig, "profileApp");
    const auth = getAuth(app);
    const db = getFirestore(app);

    const loginPrompt = document.getElementById('loginPrompt');
    const loadingSkeleton = document.getElementById('loadingSkeleton');
    const profileContent = document.getElementById('profileContent');

    loadingSkeleton.classList.add('visible');

    onAuthStateChanged(auth, async (user) => {
      loadingSkeleton.classList.remove('visible');

      if (!user) {
        loginPrompt.style.display = 'flex';
        profileContent.style.display = 'none';
        if (window.hideLoader) window.hideLoader();
        return;
      }

      loginPrompt.style.display = 'none';
      loadingSkeleton.classList.add('visible');

      try {
        const userDoc = await getDoc(doc(db, "users", user.uid));
        const data = userDoc.exists() ? userDoc.data() : {};
        populateProfile(user, data);
      } catch (err) {
        console.error('Error loading profile:', err);
        populateProfile(user, {});
      }

      loadingSkeleton.classList.remove('visible');
      profileContent.style.display = 'block';
      if (window.hideLoader) window.hideLoader();
    });

    function getStatusBadge(value) {
      const status = (value || 'pending').toLowerCase();
      let color, bg;
      if (status === 'approved') { color = '#10b981'; bg = 'rgba(16, 185, 129, 0.1)'; }
      else if (status === 'pending') { color = '#f59e0b'; bg = 'rgba(245, 158, 11, 0.1)'; }
      else if (status === 'rejected' || status === 'suspended') { color = '#ef4444'; bg = 'rgba(239, 68, 68, 0.1)'; }
      else { color = '#9ca3af'; bg = 'rgba(156, 163, 175, 0.1)'; }
      return '<span style="display:inline-flex;align-items:center;gap:6px;padding:4px 12px;border-radius:20px;font-size:12px;font-weight:600;color:' + color + ';background:' + bg + ';border:1px solid ' + color + '30;text-transform:capitalize;">' + status + '</span>';
    }

    function formatDate(timestamp) {
      if (!timestamp) return 'N/A';
      let date;
      if (timestamp.toDate) {
        date = timestamp.toDate();
      } else if (typeof timestamp === 'string' || typeof timestamp === 'number') {
        date = new Date(timestamp);
      } else {
        return 'N/A';
      }
      if (isNaN(date.getTime())) return 'N/A';
      return date.toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
    }

    function maskUid(uid) {
      if (!uid || uid.length < 8) return uid || 'N/A';
      return uid.substring(0, 4) + '...' + uid.substring(uid.length - 4);
    }

    function populateProfile(user, data) {
      const emoji = data.profileEmoji || '';
      const nickname = data.nickname || data.displayName || user.displayName || '';
      const emailName = user.email ? user.email.split('@')[0] : 'User';
      const displayName = nickname || emailName;

      const avatarEl = document.getElementById('profileAvatar');
      if (emoji) {
        avatarEl.textContent = emoji;
        avatarEl.style.fontSize = '36px';
      } else {
        avatarEl.textContent = displayName.charAt(0).toUpperCase();
      }

      document.getElementById('profileName').innerHTML = displayName;
      document.getElementById('profileEmail').textContent = user.email || 'No email';

      const tierBadge = document.getElementById('tierBadge');
      const paymentStatus = (data.paymentStatus || '').toLowerCase();
      if (paymentStatus === 'approved' || paymentStatus === 'vip') {
        tierBadge.className = 'tier-badge vip';
        tierBadge.textContent = 'VIP';
      } else {
        tierBadge.className = 'tier-badge standard';
        tierBadge.textContent = paymentStatus ? paymentStatus.charAt(0).toUpperCase() + paymentStatus.slice(1) : 'Standard';
      }

      const verBadge = document.getElementById('verificationBadge');
      if (user.emailVerified) {
        verBadge.className = 'verification-badge verified';
        verBadge.innerHTML = '<svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg> Verified';
      } else {
        verBadge.className = 'verification-badge unverified';
        verBadge.innerHTML = '<svg viewBox="0 0 24 24"><path d="M1 21h22L12 2 1 21zm12-3h-2v-2h2v2zm0-4h-2v-4h2v4z"/></svg> Unverified';
      }

      const createdAt = data.createdAt || (user.metadata ? user.metadata.creationTime : null);
      document.getElementById('memberSince').textContent = createdAt ? 'Member since ' + formatDate(createdAt) : '';

      const statusItems = [
        { label: 'Overall Status', key: 'status', iconClass: 'green', icon: '<svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>' },
        { label: 'Payment Status', key: 'paymentStatus', iconClass: 'yellow', icon: '<svg viewBox="0 0 24 24"><path d="M20 4H4c-1.11 0-1.99.89-1.99 2L2 18c0 1.11.89 2 2 2h16c1.11 0 2-.89 2-2V6c0-1.11-.89-2-2-2zm0 14H4v-6h16v6zm0-10H4V6h16v2z"/></svg>' },
        { label: 'Quotex Access', key: 'quotexStatus', iconClass: 'cyan', icon: '<svg viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-7 3c1.93 0 3.5 1.57 3.5 3.5S13.93 13 12 13s-3.5-1.57-3.5-3.5S10.07 6 12 6zm7 13H5v-.23c0-.62.28-1.2.76-1.58C7.47 15.82 9.64 15 12 15s4.53.82 6.24 2.19c.48.38.76.97.76 1.58V19z"/></svg>' },
        { label: 'Recovery Coaching', key: 'recoveryRequest', iconClass: 'green', icon: '<svg viewBox="0 0 24 24"><path d="M12 5V1L7 6l5 5V7c3.31 0 6 2.69 6 6s-2.69 6-6 6-6-2.69-6-6H4c0 4.42 3.58 8 8 8s8-3.58 8-8-3.58-8-8-8z"/></svg>' },
        { label: 'DigiMaxx Access', key: 'digimaxStatus', iconClass: 'purple', icon: '<svg viewBox="0 0 24 24"><path d="M17 12h-5v5h5v-5zM16 1v2H8V1H6v2H5c-1.11 0-1.99.9-1.99 2L3 19c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2h-1V1h-2zm3 18H5V8h14v11z"/></svg>' },
        { label: 'DigimunX Advanced', key: 'DigimunXAdv', iconClass: 'blue', icon: '<svg viewBox="0 0 24 24"><path d="M12 2l-5.5 9h11L12 2zm0 3.84L13.93 9h-3.87L12 5.84zM17.5 13c-2.49 0-4.5 2.01-4.5 4.5s2.01 4.5 4.5 4.5 4.5-2.01 4.5-4.5-2.01-4.5-4.5-4.5zm0 7c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5zM3 21.5h8v-8H3v8zm2-6h4v4H5v-4z"/></svg>' }
      ];

      const statusGrid = document.getElementById('statusGrid');
      statusGrid.innerHTML = statusItems.map(function(item) {
        return '<div class="status-item">' +
          '<div class="status-item-header">' +
            '<div class="status-item-icon ' + item.iconClass + '">' + item.icon + '</div>' +
            '<span class="status-item-label">' + item.label + '</span>' +
          '</div>' +
          '<div class="status-item-value">' + getStatusBadge(data[item.key]) + '</div>' +
        '</div>';
      }).join('');

      const contactList = document.getElementById('contactList');
      const contacts = [
        {
          label: 'Telegram',
          value: data.telegram || '',
          iconClass: 'telegram',
          icon: '<svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm4.64 6.8c-.15 1.58-.8 5.42-1.13 7.19-.14.75-.42 1-.68 1.03-.58.05-1.02-.38-1.58-.75-.88-.58-1.38-.94-2.23-1.5-.99-.65-.35-1.01.22-1.59.15-.15 2.71-2.48 2.76-2.69.01-.03.01-.14-.07-.2-.08-.06-.19-.04-.27-.02-.12.03-1.99 1.27-5.62 3.72-.53.37-1.01.55-1.44.54-.47-.01-1.38-.27-2.06-.49-.83-.27-1.49-.42-1.43-.89.03-.25.38-.5 1.04-.78 4.07-1.77 6.79-2.94 8.15-3.51 3.88-1.62 4.69-1.9 5.21-1.91.12 0 .37.03.54.17.14.12.18.28.2.45-.01.06.01.24 0 .38z"/></svg>'
        },
        {
          label: 'WhatsApp',
          value: data.whatsapp || '',
          iconClass: 'whatsapp',
          icon: '<svg viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>'
        },
        {
          label: 'Phone',
          value: data.phone || '',
          iconClass: 'phone',
          icon: '<svg viewBox="0 0 24 24"><path d="M6.62 10.79c1.44 2.83 3.76 5.14 6.59 6.59l2.2-2.2c.27-.27.67-.36 1.02-.24 1.12.37 2.33.57 3.57.57.55 0 1 .45 1 1V20c0 .55-.45 1-1 1-9.39 0-17-7.61-17-17 0-.55.45-1 1-1h3.5c.55 0 1 .45 1 1 0 1.25.2 2.45.57 3.57.11.35.03.74-.25 1.02l-2.2 2.2z"/></svg>'
        }
      ];

      contactList.innerHTML = contacts.map(function(c) {
        const hasValue = !!c.value;
        return '<div class="contact-item">' +
          '<div class="contact-item-icon ' + c.iconClass + '">' + c.icon + '</div>' +
          '<div class="contact-item-text">' +
            '<div class="contact-item-label">' + c.label + '</div>' +
            '<div class="contact-item-value' + (hasValue ? '' : ' not-provided') + '">' + (hasValue ? c.value : 'Not provided') + '</div>' +
          '</div>' +
        '</div>';
      }).join('');

      const activityList = document.getElementById('activityList');
      const memberDate = data.createdAt || (user.metadata ? user.metadata.creationTime : null);
      const lastLogin = user.metadata ? user.metadata.lastSignInTime : null;

      const activities = [
        { label: 'Member Since', value: formatDate(memberDate) },
        { label: 'Last Login', value: formatDate(lastLogin) },
        { label: 'Email Verified', value: user.emailVerified ? '<span style="color:#10b981;font-weight:600;">Yes</span>' : '<span style="color:#f59e0b;font-weight:600;">No</span>' },
        { label: 'Account UID', value: '<span class="activity-value uid">' + maskUid(user.uid) + '</span>', isHtml: true }
      ];

      activityList.innerHTML = activities.map(function(a) {
        return '<div class="activity-item">' +
          '<span class="activity-label">' + a.label + '</span>' +
          '<span class="activity-value">' + a.value + '</span>' +
        '</div>';
      }).join('');
    }
  </script>

</body>
</html>
