<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digimun Global Loader — SVG Preview</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.88);
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
        }

        .preview-label {
            position: fixed;
            top: 16px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(41, 171, 226, 0.1);
            border: 1px solid rgba(41, 171, 226, 0.2);
            color: #29ABE2;
            padding: 8px 20px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 500;
            letter-spacing: 0.5px;
        }

        .loader-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 14px;
        }

        .logo-wrapper {
            width: clamp(56px, 8vw, 64px);
            height: clamp(56px, 8vw, 64px);
            position: relative;
            animation: breathe 2.8s cubic-bezier(0.4, 0, 0.2, 1) infinite;
            will-change: transform, filter;
        }

        .d-logo {
            width: 100%;
            height: 100%;
            overflow: visible;
            filter: drop-shadow(0 0 0px transparent);
            animation: glow 2.8s cubic-bezier(0.4, 0, 0.2, 1) infinite;
            will-change: filter;
        }

        .d-outline {
            fill: none;
            stroke: #29ABE2;
            stroke-width: 4;
            stroke-linecap: square;
            stroke-linejoin: miter;
            stroke-dasharray: 1;
            stroke-dashoffset: 1;
            animation: drawOutline 2.8s cubic-bezier(0.25, 0.1, 0.25, 1) infinite;
            will-change: stroke-dashoffset, opacity;
        }

        .d-fill {
            fill: #29ABE2;
            clip-path: inset(0 100% 0 0);
            animation: fillColor 2.8s cubic-bezier(0.25, 0.1, 0.25, 1) infinite;
            will-change: clip-path, opacity;
        }

        @keyframes drawOutline {
            0% {
                stroke-dashoffset: 1;
                opacity: 0;
            }
            6% {
                opacity: 1;
            }
            38% {
                stroke-dashoffset: 0;
                opacity: 1;
            }
            70% {
                stroke-dashoffset: 0;
                opacity: 0.6;
            }
            88% {
                stroke-dashoffset: 0.6;
                opacity: 0.15;
            }
            100% {
                stroke-dashoffset: 1;
                opacity: 0;
            }
        }

        @keyframes fillColor {
            0%, 28% {
                clip-path: inset(0 100% 0 0);
                opacity: 0;
            }
            32% {
                opacity: 0.5;
            }
            58% {
                clip-path: inset(0 0% 0 0);
                opacity: 1;
            }
            75% {
                clip-path: inset(0 0% 0 0);
                opacity: 1;
            }
            92% {
                clip-path: inset(0 0% 0 0);
                opacity: 0;
            }
            100% {
                clip-path: inset(0 100% 0 0);
                opacity: 0;
            }
        }

        @keyframes glow {
            0% {
                filter: drop-shadow(0 0 0px transparent);
            }
            45% {
                filter: drop-shadow(0 0 12px rgba(41, 171, 226, 0.35));
            }
            75% {
                filter: drop-shadow(0 0 8px rgba(41, 171, 226, 0.2));
            }
            100% {
                filter: drop-shadow(0 0 0px transparent);
            }
        }

        @keyframes breathe {
            0%, 100% {
                transform: scale(1);
            }
            45% {
                transform: scale(1.03);
            }
            75% {
                transform: scale(1.01);
            }
        }

        .loading-text {
            display: flex;
            align-items: center;
            justify-content: center;
            color: #ffffff;
            font-size: clamp(9px, 2.5vw, 11px);
            font-weight: 400;
            letter-spacing: 2.5px;
            text-transform: uppercase;
            opacity: 0.65;
        }

        .loading-dots {
            display: inline-flex;
            width: 16px;
            margin-left: 1px;
        }

        .dot {
            opacity: 0.25;
            animation: dotPulse 1.4s cubic-bezier(0.4, 0, 0.2, 1) infinite;
        }

        .dot:nth-child(1) { animation-delay: 0s; }
        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes dotPulse {
            0%, 60%, 100% { opacity: 0.25; }
            30% { opacity: 1; }
        }

        .info-panel {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255,255,255,0.3);
            font-size: 10px;
            text-align: center;
        }

        @media (max-width: 480px) {
            .logo-wrapper {
                width: 56px;
                height: 56px;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            .logo-wrapper {
                animation: none;
            }
            .d-logo {
                animation: none;
                filter: none;
            }
            .d-outline {
                animation: none;
                stroke-dashoffset: 0;
                opacity: 1;
            }
            .d-fill {
                animation: none;
                clip-path: inset(0 0% 0 0);
                opacity: 1;
            }
            .dot {
                animation: none;
                opacity: 0.6;
            }
        }
    </style>
</head>
<body>
    <a href="#" onclick="goBack(); return false;" style="position:fixed;top:16px;left:16px;z-index:9999;display:flex;align-items:center;gap:8px;padding:10px 16px;background:rgba(20,20,28,0.9);border:1px solid rgba(0,212,170,0.3);border-radius:12px;color:#00D4AA;text-decoration:none;font-size:14px;font-weight:600;backdrop-filter:blur(8px);">← Back</a>
    <script>function goBack(){if(window.history.length>1){window.history.back();}else{window.location.href='/';}}</script>
    <div class="preview-label">Digimun Global Loader — SVG Preview</div>

    <div class="loader-container">
        <div class="logo-wrapper">
            <svg class="d-logo" viewBox="0 0 100 110" xmlns="http://www.w3.org/2000/svg">
                <path class="d-outline" pathLength="1" d="
                    M 8 2
                    L 8 108
                    L 50 108
                    C 85 108, 98 85, 98 55
                    C 98 25, 85 2, 50 2
                    L 8 2
                    M 26 22
                    L 48 22
                    C 70 22, 80 35, 80 55
                    C 80 75, 70 88, 48 88
                    L 26 88
                    L 26 22
                "/>
                <path class="d-fill" d="
                    M 8 2
                    L 50 2
                    C 85 2, 98 25, 98 55
                    C 98 85, 85 108, 50 108
                    L 8 108
                    L 8 2
                    Z
                    M 26 22
                    L 26 88
                    L 48 88
                    C 70 88, 80 75, 80 55
                    C 80 35, 70 22, 48 22
                    L 26 22
                    Z
                " fill-rule="evenodd"/>
            </svg>
        </div>

        <div class="loading-text">
            LOADING<span class="loading-dots"><span class="dot">.</span><span class="dot">.</span><span class="dot">.</span></span>
        </div>
    </div>

    <p class="info-panel">~2.8s loop | Fintech-grade</p>
</body>
</html>
