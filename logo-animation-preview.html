<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digimun Global Loader — SVG Preview</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.88);
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
        }

        .preview-label {
            position: fixed;
            top: 16px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(41, 171, 226, 0.1);
            border: 1px solid rgba(41, 171, 226, 0.2);
            color: #29ABE2;
            padding: 8px 20px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 500;
            letter-spacing: 0.5px;
        }

        .loader-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 14px;
        }

        .logo-wrapper {
            width: 48px;
            height: 48px;
            position: relative;
        }

        .d-logo {
            width: 100%;
            height: 100%;
            overflow: visible;
            filter: drop-shadow(0 0 0px rgba(41, 171, 226, 0));
            animation: glowPulse 2s ease-in-out infinite;
        }

        .d-shape {
            fill: #29ABE2;
        }

        @keyframes glowPulse {
            0%, 100% {
                filter: drop-shadow(0 0 2px rgba(41, 171, 226, 0.3));
            }
            50% {
                filter: drop-shadow(0 0 8px rgba(41, 171, 226, 0.7)) drop-shadow(0 0 16px rgba(41, 171, 226, 0.4));
            }
        }

        .scan-line {
            position: absolute;
            top: 0;
            left: -10%;
            width: 20%;
            height: 100%;
            background: linear-gradient(90deg, 
                transparent 0%, 
                rgba(255, 255, 255, 0.08) 40%,
                rgba(255, 255, 255, 0.15) 50%,
                rgba(255, 255, 255, 0.08) 60%,
                transparent 100%
            );
            animation: scanMove 2s ease-in-out infinite;
            pointer-events: none;
        }

        @keyframes scanMove {
            0% { left: -20%; }
            100% { left: 120%; }
        }

        .loading-text {
            display: flex;
            align-items: center;
            justify-content: center;
            color: #ffffff;
            font-size: 10px;
            font-weight: 400;
            letter-spacing: 2.5px;
            text-transform: uppercase;
            opacity: 0.65;
        }

        .loading-dots {
            display: inline-flex;
            width: 16px;
            margin-left: 1px;
        }

        .dot {
            opacity: 0.25;
            animation: dotPulse 1s ease-in-out infinite;
        }

        .dot:nth-child(1) { animation-delay: 0s; }
        .dot:nth-child(2) { animation-delay: 0.15s; }
        .dot:nth-child(3) { animation-delay: 0.3s; }

        @keyframes dotPulse {
            0%, 70%, 100% { opacity: 0.25; }
            35% { opacity: 1; }
        }

        .info-panel {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255,255,255,0.3);
            font-size: 10px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="preview-label">Digimun Global Loader — SVG Preview</div>

    <div class="loader-container">
        <div class="logo-wrapper">
            <svg class="d-logo" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                <path class="d-shape" d="
                    M 6 4
                    L 48 4
                    C 76 4, 94 22, 94 50
                    C 94 78, 76 96, 48 96
                    L 6 96
                    L 6 4
                    Z
                    M 22 20
                    L 22 80
                    L 46 80
                    C 64 80, 78 66, 78 50
                    C 78 34, 64 20, 46 20
                    L 22 20
                    Z
                " fill-rule="evenodd"/>
            </svg>
            <div class="scan-line"></div>
        </div>

        <div class="loading-text">
            LOADING<span class="loading-dots"><span class="dot">.</span><span class="dot">.</span><span class="dot">.</span></span>
        </div>
    </div>

    <p class="info-panel">~2s loop | Fintech-grade</p>
</body>
</html>
