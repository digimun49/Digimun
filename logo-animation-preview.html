<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digimun Global Loader — SVG Preview</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.88);
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
        }

        .preview-label {
            position: fixed;
            top: 16px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(41, 171, 226, 0.1);
            border: 1px solid rgba(41, 171, 226, 0.2);
            color: #29ABE2;
            padding: 8px 20px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 500;
            letter-spacing: 0.5px;
        }

        .loader-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 14px;
        }

        .logo-wrapper {
            width: 48px;
            height: 48px;
            position: relative;
        }

        .d-logo {
            width: 100%;
            height: 100%;
            overflow: visible;
        }

        .d-shape {
            fill: #29ABE2;
            animation: logoReveal 2.2s ease-in-out infinite;
        }

        @keyframes logoReveal {
            0% { 
                opacity: 0;
                filter: blur(2px);
                transform: scale(0.97);
            }
            20% { 
                opacity: 1;
                filter: blur(0);
                transform: scale(1);
            }
            70% { 
                opacity: 1;
                filter: blur(0);
                transform: scale(1);
            }
            85% { 
                opacity: 0.6;
                filter: blur(0.5px);
                transform: scale(0.99);
            }
            100% { 
                opacity: 0;
                filter: blur(2px);
                transform: scale(0.97);
            }
        }

        .loading-text {
            display: flex;
            align-items: center;
            justify-content: center;
            color: #ffffff;
            font-size: 10px;
            font-weight: 400;
            letter-spacing: 2.5px;
            text-transform: uppercase;
            opacity: 0.65;
        }

        .loading-dots {
            display: inline-flex;
            width: 16px;
            margin-left: 1px;
        }

        .dot {
            opacity: 0.25;
            animation: dotPulse 1s ease-in-out infinite;
        }

        .dot:nth-child(1) { animation-delay: 0s; }
        .dot:nth-child(2) { animation-delay: 0.15s; }
        .dot:nth-child(3) { animation-delay: 0.3s; }

        @keyframes dotPulse {
            0%, 70%, 100% { opacity: 0.25; }
            35% { opacity: 1; }
        }

        .info-panel {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255,255,255,0.3);
            font-size: 10px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="preview-label">Digimun Global Loader — SVG Preview</div>

    <div class="loader-container">
        <div class="logo-wrapper">
            <svg class="d-logo" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                <!-- Complete D shape - outer boundary with inner cutout -->
                <path class="d-shape" d="
                    M 4 2
                    L 50 2
                    C 80 2, 98 20, 98 50
                    C 98 80, 80 98, 50 98
                    L 4 98
                    L 4 2
                    Z
                    M 22 20
                    L 22 80
                    L 48 80
                    C 68 80, 80 68, 80 50
                    C 80 32, 68 20, 48 20
                    L 22 20
                    Z
                " fill-rule="evenodd"/>
            </svg>
        </div>

        <div class="loading-text">
            LOADING<span class="loading-dots"><span class="dot">.</span><span class="dot">.</span><span class="dot">.</span></span>
        </div>
    </div>

    <p class="info-panel">~2s loop | Fintech-grade</p>
</body>
</html>
