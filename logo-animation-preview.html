<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digimun Global Loader — SVG Preview</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.88);
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
        }

        .preview-label {
            position: fixed;
            top: 16px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(41, 171, 226, 0.1);
            border: 1px solid rgba(41, 171, 226, 0.2);
            color: #29ABE2;
            padding: 8px 20px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 500;
            letter-spacing: 0.5px;
        }

        .loader-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 14px;
        }

        .logo-wrapper {
            width: 48px;
            height: 48px;
            position: relative;
        }

        .d-logo {
            width: 100%;
            height: 100%;
            overflow: visible;
        }

        .d-segment {
            fill: #29ABE2;
        }

        .seg-1 { animation: assemble1 2.2s ease-in-out infinite; }
        .seg-2 { animation: assemble2 2.2s ease-in-out infinite; }
        .seg-3 { animation: assemble3 2.2s ease-in-out infinite; }
        .seg-4 { animation: assemble4 2.2s ease-in-out infinite; }
        .seg-5 { animation: assemble5 2.2s ease-in-out infinite; }
        .seg-6 { animation: assemble6 2.2s ease-in-out infinite; }

        @keyframes assemble1 {
            0%, 4% { opacity: 0; transform: translate(-1.5px, 0); }
            16%, 72% { opacity: 1; transform: translate(0, 0); }
            85%, 100% { opacity: 0; transform: translate(-1.5px, 0); }
        }

        @keyframes assemble2 {
            0%, 10% { opacity: 0; transform: translate(0, -1.5px); }
            22%, 72% { opacity: 1; transform: translate(0, 0); }
            85%, 100% { opacity: 0; transform: translate(0, -1.5px); }
        }

        @keyframes assemble3 {
            0%, 16% { opacity: 0; transform: translate(1.5px, -0.5px); }
            28%, 72% { opacity: 1; transform: translate(0, 0); }
            85%, 100% { opacity: 0; transform: translate(1.5px, -0.5px); }
        }

        @keyframes assemble4 {
            0%, 22% { opacity: 0; transform: translate(1.5px, 0.5px); }
            34%, 72% { opacity: 1; transform: translate(0, 0); }
            85%, 100% { opacity: 0; transform: translate(1.5px, 0.5px); }
        }

        @keyframes assemble5 {
            0%, 28% { opacity: 0; transform: translate(0, 1.5px); }
            40%, 72% { opacity: 1; transform: translate(0, 0); }
            85%, 100% { opacity: 0; transform: translate(0, 1.5px); }
        }

        @keyframes assemble6 {
            0%, 34% { opacity: 0; transform: translate(-0.5px, 0); }
            46%, 72% { opacity: 1; transform: translate(0, 0); }
            85%, 100% { opacity: 0; transform: translate(-0.5px, 0); }
        }

        .loading-text {
            display: flex;
            align-items: center;
            justify-content: center;
            color: #ffffff;
            font-size: 10px;
            font-weight: 400;
            letter-spacing: 2.5px;
            text-transform: uppercase;
            opacity: 0.65;
        }

        .loading-dots {
            display: inline-flex;
            width: 16px;
            margin-left: 1px;
        }

        .dot {
            opacity: 0.25;
            animation: dotPulse 1s ease-in-out infinite;
        }

        .dot:nth-child(1) { animation-delay: 0s; }
        .dot:nth-child(2) { animation-delay: 0.15s; }
        .dot:nth-child(3) { animation-delay: 0.3s; }

        @keyframes dotPulse {
            0%, 70%, 100% { opacity: 0.25; }
            35% { opacity: 1; }
        }

        .info-panel {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255,255,255,0.3);
            font-size: 10px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="preview-label">Digimun Global Loader — SVG Preview</div>

    <div class="loader-container">
        <div class="logo-wrapper">
            <svg class="d-logo" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                <!-- Segment 1: Left vertical bar -->
                <path class="d-segment seg-1" d="
                    M4 4 
                    Q4 0 8 0 
                    L18 0 
                    L18 100 
                    L8 100 
                    Q4 100 4 96 
                    L4 4 Z"/>
                
                <!-- Segment 2: Top horizontal section -->
                <path class="d-segment seg-2" d="
                    M18 0 
                    L54 0 
                    Q62 0 70 4
                    L70 14
                    Q64 10 56 10
                    L18 10 
                    Z"/>
                
                <!-- Segment 3: Top-right curve -->
                <path class="d-segment seg-3" d="
                    M70 4 
                    Q82 10 90 22
                    Q96 32 98 44
                    L88 46
                    Q86 36 82 28
                    Q76 18 70 14
                    Z"/>
                
                <!-- Segment 4: Bottom-right curve -->
                <path class="d-segment seg-4" d="
                    M98 44
                    Q100 50 98 56
                    Q96 68 90 78
                    Q82 90 70 96
                    L70 86
                    Q78 82 84 74
                    Q88 66 88 54
                    Z"/>
                
                <!-- Segment 5: Bottom horizontal section -->
                <path class="d-segment seg-5" d="
                    M70 96 
                    Q62 100 54 100
                    L18 100
                    L18 90
                    L56 90
                    Q64 90 70 86
                    Z"/>
                
                <!-- Segment 6: Inner D cutout with hollow -->
                <path class="d-segment seg-6" d="
                    M28 16
                    L52 16
                    Q70 16 80 28
                    Q88 38 88 50
                    Q88 62 80 72
                    Q70 84 52 84
                    L28 84
                    Z
                    M28 28
                    L28 72
                    L50 72
                    Q62 72 70 64
                    Q76 58 76 50
                    Q76 42 70 36
                    Q62 28 50 28
                    Z
                " fill-rule="evenodd"/>
            </svg>
        </div>

        <div class="loading-text">
            LOADING<span class="loading-dots"><span class="dot">.</span><span class="dot">.</span><span class="dot">.</span></span>
        </div>
    </div>

    <p class="info-panel">~2s loop | Fintech-grade</p>
</body>
</html>
