<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digimun Global Loader — SVG Preview</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.88);
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
        }

        .preview-label {
            position: fixed;
            top: 16px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(41, 171, 226, 0.1);
            border: 1px solid rgba(41, 171, 226, 0.2);
            color: #29ABE2;
            padding: 8px 20px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 500;
            letter-spacing: 0.5px;
        }

        .loader-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 14px;
        }

        .logo-wrapper {
            width: clamp(40px, 10vw, 52px);
            height: clamp(40px, 10vw, 52px);
            position: relative;
        }

        .d-logo {
            width: 100%;
            height: 100%;
            overflow: visible;
        }

        .d-outline {
            fill: none;
            stroke: #29ABE2;
            stroke-width: 4;
            stroke-linecap: square;
            stroke-linejoin: miter;
            stroke-dasharray: 1;
            stroke-dashoffset: 1;
            animation: drawOutline 2.5s ease-in-out infinite;
        }

        .d-fill {
            fill: #29ABE2;
            clip-path: inset(0 100% 0 0);
            animation: fillColor 2.5s ease-in-out infinite;
        }

        @keyframes drawOutline {
            0% {
                stroke-dashoffset: 1;
            }
            40% {
                stroke-dashoffset: 0;
            }
            70%, 100% {
                stroke-dashoffset: 0;
            }
        }

        @keyframes fillColor {
            0%, 35% {
                clip-path: inset(0 100% 0 0);
            }
            60% {
                clip-path: inset(0 0% 0 0);
            }
            85%, 100% {
                clip-path: inset(0 0% 0 0);
            }
        }

        .loading-text {
            display: flex;
            align-items: center;
            justify-content: center;
            color: #ffffff;
            font-size: clamp(9px, 2.5vw, 11px);
            font-weight: 400;
            letter-spacing: 2.5px;
            text-transform: uppercase;
            opacity: 0.65;
        }

        .loading-dots {
            display: inline-flex;
            width: 16px;
            margin-left: 1px;
        }

        .dot {
            opacity: 0.25;
            animation: dotPulse 1s ease-in-out infinite;
        }

        .dot:nth-child(1) { animation-delay: 0s; }
        .dot:nth-child(2) { animation-delay: 0.15s; }
        .dot:nth-child(3) { animation-delay: 0.3s; }

        @keyframes dotPulse {
            0%, 70%, 100% { opacity: 0.25; }
            35% { opacity: 1; }
        }

        .info-panel {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255,255,255,0.3);
            font-size: 10px;
            text-align: center;
        }

        @media (max-width: 480px) {
            .logo-wrapper {
                width: 44px;
                height: 44px;
            }
        }
    </style>
</head>
<body>
    <div class="preview-label">Digimun Global Loader — SVG Preview</div>

    <div class="loader-container">
        <div class="logo-wrapper">
            <svg class="d-logo" viewBox="0 0 100 110" xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <clipPath id="fillClip">
                        <rect x="0" y="0" width="100" height="110">
                            <animate 
                                attributeName="width" 
                                values="0;0;100;100;0" 
                                keyTimes="0;0.35;0.6;0.85;1" 
                                dur="2.5s" 
                                repeatCount="indefinite"/>
                        </rect>
                    </clipPath>
                </defs>

                <!-- Outline that draws first -->
                <path class="d-outline" pathLength="1" d="
                    M 8 2
                    L 8 108
                    L 50 108
                    C 85 108, 98 85, 98 55
                    C 98 25, 85 2, 50 2
                    L 8 2
                    M 26 22
                    L 48 22
                    C 70 22, 80 35, 80 55
                    C 80 75, 70 88, 48 88
                    L 26 88
                    L 26 22
                "/>

                <!-- Fill that appears after outline -->
                <path clip-path="url(#fillClip)" class="d-fill" d="
                    M 8 2
                    L 50 2
                    C 85 2, 98 25, 98 55
                    C 98 85, 85 108, 50 108
                    L 8 108
                    L 8 2
                    Z
                    M 26 22
                    L 26 88
                    L 48 88
                    C 70 88, 80 75, 80 55
                    C 80 35, 70 22, 48 22
                    L 26 22
                    Z
                " fill-rule="evenodd"/>
            </svg>
        </div>

        <div class="loading-text">
            LOADING<span class="loading-dots"><span class="dot">.</span><span class="dot">.</span><span class="dot">.</span></span>
        </div>
    </div>

    <p class="info-panel">~2.5s loop | Fintech-grade</p>
</body>
</html>
