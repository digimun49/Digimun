<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>DigimunXLive - All Trading Signals | Digimun Pro</title>
    <meta name="description" content="DigimunXLive - View all trading signals from the Digimun Pro community. Live signals, results, and performance tracking.">
    <meta name="theme-color" content="#0a0f1a">
    <link rel="icon" href="/assets/digimun-favicon.png" type="image/png">
    <link rel="apple-touch-icon" href="/assets/apple-touch-icon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #030508;
            color: #f8fafc;
            line-height: 1.6;
            min-height: 100vh;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        .top-nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 14px 20px;
            background: rgba(3, 5, 8, 0.92);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(56, 189, 248, 0.1);
        }

        .back-btn {
            width: 38px;
            height: 38px;
            border-radius: 10px;
            border: 1px solid rgba(56, 189, 248, 0.15);
            background: rgba(15, 23, 42, 0.6);
            color: #94a3b8;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.25s;
            flex-shrink: 0;
        }

        .back-btn:hover {
            border-color: #22d3ee;
            color: #22d3ee;
            background: rgba(34, 211, 238, 0.08);
        }

        .nav-title {
            font-size: 1.15rem;
            font-weight: 800;
            background: linear-gradient(135deg, #ffffff, #22d3ee, #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.02em;
        }

        .tabs-bar {
            position: fixed;
            top: 67px;
            left: 0;
            right: 0;
            z-index: 99;
            display: flex;
            gap: 0;
            background: rgba(10, 15, 26, 0.95);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-bottom: 1px solid rgba(56, 189, 248, 0.08);
        }

        .tab-btn {
            flex: 1;
            padding: 14px 16px;
            border: none;
            background: transparent;
            color: #64748b;
            font-size: 14px;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
            letter-spacing: 0.01em;
        }

        .tab-btn::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 20%;
            right: 20%;
            height: 2px;
            background: transparent;
            border-radius: 2px 2px 0 0;
            transition: all 0.3s;
        }

        .tab-btn.active {
            color: #22d3ee;
        }

        .tab-btn.active::after {
            background: linear-gradient(90deg, #22d3ee, #a855f7);
            left: 10%;
            right: 10%;
        }

        .tab-btn:hover:not(.active) {
            color: #94a3b8;
            background: rgba(34, 211, 238, 0.03);
        }

        .content-area {
            padding-top: 120px;
            min-height: 100vh;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .telegram-iframe {
            width: 100%;
            min-height: 100vh;
            border: none;
            display: block;
        }

        .signals-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 24px clamp(12px, 3vw, 24px);
        }

        .signals-header {
            text-align: center;
            margin-bottom: 32px;
        }

        .signals-header h2 {
            font-size: clamp(1.4rem, 4vw, 1.8rem);
            font-weight: 800;
            background: linear-gradient(135deg, #f8fafc, #22d3ee);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
        }

        .signals-header p {
            color: #64748b;
            font-size: 14px;
        }

        .loading-spinner {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 80px 20px;
            gap: 16px;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(34, 211, 238, 0.15);
            border-top-color: #22d3ee;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-spinner span {
            color: #64748b;
            font-size: 14px;
        }

        .empty-state {
            text-align: center;
            padding: 80px 20px;
        }

        .empty-state svg {
            width: 64px;
            height: 64px;
            color: #334155;
            margin-bottom: 16px;
        }

        .empty-state h3 {
            font-size: 1.2rem;
            color: #94a3b8;
            margin-bottom: 8px;
        }

        .empty-state p {
            color: #64748b;
            font-size: 14px;
        }

        .signals-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 20px;
        }

        @media (max-width: 400px) {
            .signals-grid {
                grid-template-columns: 1fr;
            }
        }

        .signal-card {
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid rgba(56, 189, 248, 0.1);
            border-radius: 16px;
            padding: 20px;
            transition: all 0.3s;
        }

        .signal-card:hover {
            border-color: rgba(56, 189, 248, 0.2);
            transform: translateY(-2px);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.3);
        }

        .card-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 14px;
        }

        .pair-name {
            font-size: 1.25rem;
            font-weight: 800;
            color: #f8fafc;
            letter-spacing: -0.01em;
        }

        .direction-badge {
            padding: 5px 14px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .direction-badge.call {
            background: rgba(34, 197, 94, 0.12);
            color: #22c55e;
            border: 1px solid rgba(34, 197, 94, 0.2);
        }

        .direction-badge.put {
            background: rgba(239, 68, 68, 0.12);
            color: #ef4444;
            border: 1px solid rgba(239, 68, 68, 0.2);
        }

        .card-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 14px;
        }

        .meta-item {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 12px;
            color: #94a3b8;
        }

        .meta-item svg {
            width: 14px;
            height: 14px;
            color: #64748b;
        }

        .confidence-value {
            color: #22d3ee;
            font-weight: 700;
        }

        .result-badge {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 4px 12px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }

        .result-badge.win {
            background: rgba(34, 197, 94, 0.12);
            color: #22c55e;
            border: 1px solid rgba(34, 197, 94, 0.2);
        }

        .result-badge.loss {
            background: rgba(239, 68, 68, 0.12);
            color: #ef4444;
            border: 1px solid rgba(239, 68, 68, 0.2);
        }

        .result-badge.invalid {
            background: rgba(234, 179, 8, 0.12);
            color: #eab308;
            border: 1px solid rgba(234, 179, 8, 0.2);
        }

        .result-badge.refunded {
            background: rgba(168, 85, 247, 0.12);
            color: #a855f7;
            border: 1px solid rgba(168, 85, 247, 0.2);
        }

        .result-badge.pending {
            background: rgba(148, 163, 184, 0.1);
            color: #94a3b8;
            border: 1px solid rgba(148, 163, 184, 0.15);
        }

        .card-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: 14px;
            padding-top: 12px;
            border-top: 1px solid rgba(56, 189, 248, 0.06);
        }

        .user-tag {
            font-size: 12px;
            color: #64748b;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .user-tag svg {
            width: 14px;
            height: 14px;
        }

        .created-date {
            font-size: 11px;
            color: #475569;
        }
    </style>
</head>
<body>
    <nav class="top-nav">
        <button class="back-btn" onclick="goBack()" aria-label="Go back">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"/><path d="m12 19-7-7 7-7"/></svg>
        </button>
        <span class="nav-title">DigimunXLive</span>
    </nav>

    <div class="tabs-bar">
        <button class="tab-btn active" onclick="switchTab('telegram')">Telegram Addition</button>
        <button class="tab-btn" onclick="switchTab('website')">Website Addition</button>
    </div>

    <div class="content-area">
        <div id="tab-telegram" class="tab-content active">
            <iframe class="telegram-iframe" src="/digimunx-telegram" loading="lazy"></iframe>
        </div>

        <div id="tab-website" class="tab-content">
            <div class="signals-container">
                <div class="signals-header">
                    <h2>All Trading Signals</h2>
                    <p>Live signals from all DigimunX users</p>
                </div>
                <div id="signals-area">
                    <div class="loading-spinner" id="loading">
                        <div class="spinner"></div>
                        <span>Loading signals...</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function goBack() {
            if (window.history.length > 1) { window.history.back(); } else { window.location.href = '/'; }
        }

        let websiteLoaded = false;

        function switchTab(tab) {
            document.querySelectorAll('.tab-btn').forEach((btn, i) => {
                btn.classList.toggle('active', (tab === 'telegram' && i === 0) || (tab === 'website' && i === 1));
            });
            document.getElementById('tab-telegram').classList.toggle('active', tab === 'telegram');
            document.getElementById('tab-website').classList.toggle('active', tab === 'website');

            if (tab === 'website' && !websiteLoaded) {
                websiteLoaded = true;
                loadAllSignals();
            }
        }

        async function loadAllSignals() {
            const area = document.getElementById('signals-area');
            try {
                const res = await fetch('/.netlify/functions/all-signals');
                const data = await res.json();

                if (!data.success || !data.signals || data.signals.length === 0) {
                    area.innerHTML = `
                        <div class="empty-state">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M8 12h.01"/><path d="M16 12h.01"/><path d="M9.5 16a6.5 6.5 0 0 1 5 0"/></svg>
                            <h3>No Signals Yet</h3>
                            <p>Trading signals will appear here once submitted.</p>
                        </div>`;
                    return;
                }

                let html = '<div class="signals-grid">';
                data.signals.forEach(s => {
                    const dirClass = (s.direction || '').toUpperCase() === 'CALL' ? 'call' : 'put';
                    const dirLabel = (s.direction || '').toUpperCase();
                    const resultClass = getResultClass(s.result);
                    const resultLabel = (s.result || s.status || 'PENDING').toUpperCase();
                    const confidence = s.confidence ? s.confidence + '%' : 'N/A';
                    const signalTime = s.signalTime || 'N/A';
                    const createdAt = formatDate(s.createdAt);
                    const userName = s.user || 'User';

                    html += `
                    <div class="signal-card">
                        <div class="card-top">
                            <span class="pair-name">${escHtml(s.pair || 'Unknown')}</span>
                            <span class="direction-badge ${dirClass}">${dirLabel || 'N/A'}</span>
                        </div>
                        <div class="card-meta">
                            <span class="meta-item">
                                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v10l4.5 4.5"/><circle cx="12" cy="12" r="10"/></svg>
                                ${escHtml(signalTime)}
                            </span>
                            <span class="meta-item">
                                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
                                <span class="confidence-value">${escHtml(confidence)}</span>
                            </span>
                            <span class="result-badge ${resultClass}">${resultLabel}</span>
                        </div>
                        <div class="card-footer">
                            <span class="user-tag">
                                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                                ${escHtml(userName)}
                            </span>
                            <span class="created-date">${createdAt}</span>
                        </div>
                    </div>`;
                });
                html += '</div>';
                area.innerHTML = html;

            } catch (err) {
                area.innerHTML = `
                    <div class="empty-state">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
                        <h3>Failed to Load Signals</h3>
                        <p>${escHtml(err.message)}</p>
                    </div>`;
            }
        }

        function getResultClass(result) {
            if (!result) return 'pending';
            switch (result.toUpperCase()) {
                case 'WIN': return 'win';
                case 'LOSS': return 'loss';
                case 'INVALID': return 'invalid';
                case 'REFUNDED': return 'refunded';
                default: return 'pending';
            }
        }

        function formatDate(val) {
            if (!val) return '';
            try {
                if (val._seconds) return new Date(val._seconds * 1000).toLocaleDateString('en-US', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
                if (val.seconds) return new Date(val.seconds * 1000).toLocaleDateString('en-US', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
                return new Date(val).toLocaleDateString('en-US', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
            } catch (e) { return ''; }
        }

        function escHtml(str) {
            if (!str) return '';
            const d = document.createElement('div');
            d.textContent = str;
            return d.innerHTML;
        }
    </script>
    <script src="/sidebar-include.js" defer></script>
    <script src="/help-widget.js" defer></script>
</body>
</html>
