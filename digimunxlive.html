<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>DigimunXLive - AI Trading Signals | Digimun Pro</title>
    <meta name="description" content="DigimunXLive - Real-time AI-generated trading signals published directly from user sessions on the Digimun Pro platform. Live signals, results, and performance tracking.">
    <meta name="theme-color" content="#020408">
    <link rel="icon" href="/assets/digimun-favicon.png" type="image/png">
    <link rel="apple-touch-icon" href="/assets/apple-touch-icon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;600;700&family=Orbitron:wght@600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #020408;
            color: #f1f5f9;
            line-height: 1.6;
            min-height: 100vh;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        .scene-bg {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            background:
                radial-gradient(ellipse at 25% 15%, rgba(56, 189, 248, 0.04) 0%, transparent 55%),
                radial-gradient(ellipse at 75% 85%, rgba(168, 85, 247, 0.03) 0%, transparent 55%);
        }

        .scene-bg::before {
            content: '';
            position: absolute;
            inset: 0;
            background-image:
                linear-gradient(rgba(34, 211, 238, 0.012) 1px, transparent 1px),
                linear-gradient(90deg, rgba(34, 211, 238, 0.012) 1px, transparent 1px);
            background-size: 50px 50px;
            opacity: 0.4;
        }

        .top-nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 14px 20px;
            background: rgba(2, 4, 8, 0.94);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border-bottom: 1px solid rgba(56, 189, 248, 0.08);
        }

        .back-btn {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            border: 1.5px solid rgba(56, 189, 248, 0.12);
            background: rgba(8, 12, 24, 0.8);
            color: #94a3b8;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.4s;
            flex-shrink: 0;
        }

        .back-btn:hover {
            border-color: #22d3ee;
            color: #22d3ee;
            background: rgba(34, 211, 238, 0.06);
            transform: translateX(-2px);
        }

        .nav-title-area {
            display: flex;
            align-items: center;
            gap: 10px;
            flex: 1;
        }

        .nav-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.1rem;
            font-weight: 800;
            background: linear-gradient(135deg, #ffffff, #22d3ee, #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.02em;
        }

        .live-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #22c55e;
            animation: livePulse 2s ease-in-out infinite;
        }

        @keyframes livePulse {
            0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.4); }
            50% { opacity: 0.7; box-shadow: 0 0 0 6px rgba(34, 197, 94, 0); }
        }

        .tabs-bar {
            position: fixed;
            top: 69px;
            left: 0;
            right: 0;
            z-index: 99;
            display: flex;
            gap: 0;
            background: rgba(6, 10, 20, 0.96);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(56, 189, 248, 0.06);
        }

        .tab-btn {
            flex: 1;
            padding: 15px 16px;
            border: none;
            background: transparent;
            color: #475569;
            font-size: 13px;
            font-weight: 700;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: all 0.4s;
            position: relative;
            letter-spacing: 0.02em;
            text-transform: uppercase;
        }

        .tab-btn::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 25%;
            right: 25%;
            height: 2px;
            background: transparent;
            border-radius: 2px 2px 0 0;
            transition: all 0.4s;
        }

        .tab-btn.active {
            color: #22d3ee;
        }

        .tab-btn.active::after {
            background: linear-gradient(90deg, #22d3ee, #a855f7);
            left: 8%;
            right: 8%;
            height: 2.5px;
        }

        .tab-btn:hover:not(.active) {
            color: #94a3b8;
            background: rgba(34, 211, 238, 0.02);
        }

        .content-area {
            position: relative;
            z-index: 1;
            padding-top: 124px;
            min-height: 100vh;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .telegram-iframe {
            width: 100%;
            min-height: 100vh;
            border: none;
            display: block;
        }

        .signals-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 28px clamp(16px, 3vw, 28px);
        }

        .signals-header {
            text-align: center;
            margin-bottom: 36px;
        }

        .signals-header h2 {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(1.3rem, 4vw, 1.7rem);
            font-weight: 800;
            color: #f1f5f9;
            margin-bottom: 10px;
            letter-spacing: -0.02em;
        }

        .signals-header p {
            color: #475569;
            font-size: 14px;
            font-weight: 500;
        }

        .signals-stats {
            display: flex;
            justify-content: center;
            gap: 24px;
            margin-top: 16px;
            flex-wrap: wrap;
        }

        .stat-chip {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px 14px;
            background: rgba(8, 12, 24, 0.8);
            border: 1px solid rgba(56, 189, 248, 0.08);
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            color: #94a3b8;
        }

        .stat-chip .stat-val {
            font-family: 'JetBrains Mono', monospace;
            font-weight: 700;
            color: #22d3ee;
        }

        .loading-spinner {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 100px 20px;
            gap: 20px;
        }

        .spinner {
            width: 44px;
            height: 44px;
            border: 3px solid rgba(34, 211, 238, 0.1);
            border-top-color: #22d3ee;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-spinner span {
            color: #475569;
            font-size: 13px;
            font-weight: 500;
        }

        .empty-state {
            text-align: center;
            padding: 100px 20px;
        }

        .empty-state-icon {
            width: 72px;
            height: 72px;
            margin: 0 auto 20px;
            background: rgba(34, 211, 238, 0.06);
            border: 1px solid rgba(34, 211, 238, 0.1);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .empty-state-icon svg {
            width: 32px;
            height: 32px;
            color: #334155;
        }

        .empty-state h3 {
            font-size: 1.1rem;
            color: #94a3b8;
            margin-bottom: 8px;
            font-weight: 700;
        }

        .empty-state p {
            color: #475569;
            font-size: 14px;
            max-width: 360px;
            margin: 0 auto;
        }

        .signals-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 16px;
        }

        @media (max-width: 400px) {
            .signals-grid {
                grid-template-columns: 1fr;
            }
        }

        .signal-card {
            background: rgba(8, 12, 24, 0.92);
            border: 1.5px solid rgba(56, 189, 248, 0.08);
            border-radius: 16px;
            padding: 20px;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .signal-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(34, 211, 238, 0.15), rgba(168, 85, 247, 0.1), transparent);
            opacity: 0;
            transition: opacity 0.4s;
        }

        .signal-card:hover {
            border-color: rgba(56, 189, 248, 0.18);
            transform: translateY(-3px);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.4), 0 0 1px rgba(34, 211, 238, 0.1);
        }

        .signal-card:hover::before {
            opacity: 1;
        }

        .card-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
        }

        .pair-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .pair-icon {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            background: rgba(34, 211, 238, 0.06);
            border: 1px solid rgba(34, 211, 238, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
        }

        .pair-name {
            font-size: 1.15rem;
            font-weight: 800;
            color: #f1f5f9;
            letter-spacing: -0.02em;
        }

        .direction-badge {
            padding: 6px 16px;
            border-radius: 8px;
            font-size: 11px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            font-family: 'JetBrains Mono', monospace;
        }

        .direction-badge.call {
            background: rgba(34, 197, 94, 0.1);
            color: #22c55e;
            border: 1.5px solid rgba(34, 197, 94, 0.2);
        }

        .direction-badge.put {
            background: rgba(239, 68, 68, 0.1);
            color: #ef4444;
            border: 1.5px solid rgba(239, 68, 68, 0.2);
        }

        .card-details {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 16px;
        }

        .detail-item {
            display: flex;
            flex-direction: column;
            gap: 3px;
            padding: 10px 12px;
            background: rgba(0, 0, 0, 0.25);
            border-radius: 10px;
            border: 1px solid rgba(56, 189, 248, 0.04);
        }

        .detail-label {
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #475569;
        }

        .detail-value {
            font-size: 14px;
            font-weight: 700;
            color: #e2e8f0;
            font-family: 'JetBrains Mono', monospace;
        }

        .detail-value.cyan {
            color: #22d3ee;
        }

        .card-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding-top: 14px;
            border-top: 1px solid rgba(56, 189, 248, 0.05);
        }

        .result-badge {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 5px 14px;
            border-radius: 8px;
            font-size: 11px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            font-family: 'JetBrains Mono', monospace;
        }

        .result-badge.win {
            background: rgba(34, 197, 94, 0.1);
            color: #22c55e;
            border: 1.5px solid rgba(34, 197, 94, 0.2);
        }

        .result-badge.loss {
            background: rgba(239, 68, 68, 0.1);
            color: #ef4444;
            border: 1.5px solid rgba(239, 68, 68, 0.2);
        }

        .result-badge.invalid {
            background: rgba(234, 179, 8, 0.1);
            color: #eab308;
            border: 1.5px solid rgba(234, 179, 8, 0.2);
        }

        .result-badge.refunded {
            background: rgba(168, 85, 247, 0.1);
            color: #a855f7;
            border: 1.5px solid rgba(168, 85, 247, 0.2);
        }

        .result-badge.pending {
            background: rgba(148, 163, 184, 0.08);
            color: #64748b;
            border: 1.5px solid rgba(148, 163, 184, 0.12);
        }

        .user-tag {
            font-size: 12px;
            color: #475569;
            display: flex;
            align-items: center;
            gap: 5px;
            font-weight: 500;
        }

        .user-tag svg {
            width: 14px;
            height: 14px;
        }

        .created-date {
            font-size: 11px;
            color: #334155;
            font-family: 'JetBrains Mono', monospace;
        }

        .new-signal-badge {
            position: absolute;
            top: 12px;
            right: 12px;
            padding: 3px 8px;
            background: linear-gradient(135deg, #22d3ee, #a855f7);
            border-radius: 6px;
            font-size: 9px;
            font-weight: 800;
            letter-spacing: 0.08em;
            color: #000;
            text-transform: uppercase;
            animation: newPulse 2s ease-in-out infinite;
        }

        @keyframes newPulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        .realtime-indicator {
            position: fixed;
            bottom: 20px;
            left: 20px;
            z-index: 50;
            display: none;
            align-items: center;
            gap: 8px;
            padding: 10px 16px;
            background: rgba(8, 12, 24, 0.95);
            border: 1.5px solid rgba(34, 197, 94, 0.2);
            border-radius: 12px;
            backdrop-filter: blur(16px);
            font-size: 12px;
            font-weight: 600;
            color: #94a3b8;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        }

        .realtime-indicator.active {
            display: flex;
        }

        .realtime-indicator .rt-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #22c55e;
            animation: livePulse 2s ease-in-out infinite;
        }

        @media (max-width: 600px) {
            .signals-header h2 { font-size: 1.2rem; }
            .signals-stats { gap: 10px; }
            .stat-chip { padding: 5px 10px; font-size: 11px; }
            .signal-card { padding: 16px; }
            .pair-name { font-size: 1.05rem; }
            .card-details { gap: 8px; }
            .detail-item { padding: 8px 10px; }
        }

        @media (max-width: 380px) {
            .card-details { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="scene-bg"></div>

    <nav class="top-nav">
        <button class="back-btn" onclick="goBack()" aria-label="Go back">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"/><path d="m12 19-7-7 7-7"/></svg>
        </button>
        <div class="nav-title-area">
            <span class="nav-title">DigimunXLive</span>
            <div class="live-dot"></div>
        </div>
    </nav>

    <div class="tabs-bar">
        <button class="tab-btn active" onclick="switchTab('telegram')">Telegram</button>
        <button class="tab-btn" onclick="switchTab('website')">Website Addition</button>
    </div>

    <div class="content-area">
        <div id="tab-telegram" class="tab-content active">
            <iframe class="telegram-iframe" src="/digimunx-telegram?embed=1" loading="lazy"></iframe>
        </div>

        <div id="tab-website" class="tab-content">
            <div class="signals-container">
                <div class="signals-header">
                    <h2>Website Addition</h2>
                    <p>AI-generated signals automatically published from live user trading sessions</p>
                    <div class="signals-stats" id="signals-stats" style="display:none;">
                        <div class="stat-chip">Total: <span class="stat-val" id="stat-total">0</span></div>
                        <div class="stat-chip">Wins: <span class="stat-val" id="stat-wins" style="color:#22c55e;">0</span></div>
                        <div class="stat-chip">Win Rate: <span class="stat-val" id="stat-rate">0%</span></div>
                    </div>
                </div>
                <div id="signals-area">
                    <div class="loading-spinner" id="loading">
                        <div class="spinner"></div>
                        <span>Loading published signals...</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="realtime-indicator" id="realtimeIndicator">
        <span class="rt-dot"></span>
        <span>Live updates active</span>
    </div>

    <script>
        function goBack() {
            if (window.history.length > 1) { window.history.back(); } else { window.location.href = '/'; }
        }

        let websiteLoaded = false;
        let loadedSignalIds = new Set();
        let allSignals = [];
        let pollInterval = null;
        const CACHE_KEY = 'digimunxlive_signals';
        const REPLIT_BASE = '';

        function loadCache() {
            try {
                const cached = JSON.parse(localStorage.getItem(CACHE_KEY));
                if (cached && cached.signals && cached.signals.length > 0) {
                    return cached;
                }
            } catch(e) {}
            return null;
        }

        function saveCache() {
            try {
                localStorage.setItem(CACHE_KEY, JSON.stringify({
                    signals: allSignals,
                    signalIds: Array.from(loadedSignalIds),
                    timestamp: Date.now()
                }));
            } catch(e) {}
        }

        window.switchTab = function(tab) {
            document.querySelectorAll('.tab-btn').forEach((btn, i) => {
                btn.classList.toggle('active', (tab === 'telegram' && i === 0) || (tab === 'website' && i === 1));
            });
            document.getElementById('tab-telegram').classList.toggle('active', tab === 'telegram');
            document.getElementById('tab-website').classList.toggle('active', tab === 'website');

            if (tab === 'website' && !websiteLoaded) {
                websiteLoaded = true;
                loadApprovedSignals();
            }
        };

        async function loadApprovedSignals() {
            const area = document.getElementById('signals-area');

            const cached = loadCache();
            if (cached) {
                allSignals = cached.signals;
                cached.signalIds.forEach(id => loadedSignalIds.add(id));
                renderSignals(allSignals);
                updateStats(allSignals);
                startPolling();

                try {
                    const res = await fetch(REPLIT_BASE + '/.netlify/functions/digimunxlive-signals');
                    const data = await res.json();
                    if (data.success && data.signals) {
                        let newSignalsAdded = false;
                        data.signals.forEach(s => {
                            if (s.signalId && !loadedSignalIds.has(s.signalId)) {
                                loadedSignalIds.add(s.signalId);
                                s.isNew = true;
                                allSignals.unshift(s);
                                newSignalsAdded = true;
                            }
                        });
                        if (newSignalsAdded) {
                            renderSignals(allSignals);
                            updateStats(allSignals);
                            saveCache();
                        }
                    }
                } catch(e) {}
                return;
            }

            try {
                const res = await fetch(REPLIT_BASE + '/.netlify/functions/digimunxlive-signals');
                const data = await res.json();

                if (data.error) {
                    const isQuota = (data.error + '').includes('RESOURCE_EXHAUSTED') || (data.error + '').includes('Quota');
                    area.innerHTML = `
                        <div class="empty-state">
                            <div class="empty-state-icon">
                                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
                            </div>
                            <h3>${isQuota ? 'Temporarily Unavailable' : 'Error Loading Signals'}</h3>
                            <p>${isQuota ? 'Database is temporarily rate-limited. Signals will auto-load when available.' : escHtml(data.error)}</p>
                        </div>`;
                    startPolling();
                    return;
                }

                if (!data.success || !data.signals || data.signals.length === 0) {
                    area.innerHTML = `
                        <div class="empty-state">
                            <div class="empty-state-icon">
                                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
                            </div>
                            <h3>No Published Signals Yet</h3>
                            <p>Signals are automatically published here as users generate them through the AI trading system.</p>
                        </div>`;
                    startPolling();
                    return;
                }

                allSignals = data.signals;
                data.signals.forEach(s => {
                    if (s.signalId) loadedSignalIds.add(s.signalId);
                });

                renderSignals(allSignals);
                updateStats(allSignals);
                saveCache();
                startPolling();

            } catch (err) {
                area.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
                        </div>
                        <h3>Connection Error</h3>
                        <p>${escHtml(err.message)}</p>
                    </div>`;
            }
        }

        function startPolling() {
            if (pollInterval) return;

            const indicator = document.getElementById('realtimeIndicator');
            if (indicator) indicator.classList.add('active');

            pollInterval = setInterval(async () => {
                try {
                    const res = await fetch(REPLIT_BASE + '/.netlify/functions/digimunxlive-signals');
                    const data = await res.json();
                    if (!data.success || !data.signals) return;

                    const serverIds = new Set(data.signals.map(s => s.signalId).filter(Boolean));
                    let changed = false;

                    data.signals.forEach(s => {
                        if (s.signalId && !loadedSignalIds.has(s.signalId)) {
                            loadedSignalIds.add(s.signalId);
                            s.isNew = true;
                            allSignals.unshift(s);
                            changed = true;
                        }
                    });

                    const removed = allSignals.filter(s => s.signalId && !serverIds.has(s.signalId));
                    if (removed.length > 0) {
                        allSignals = allSignals.filter(s => !s.signalId || serverIds.has(s.signalId));
                        loadedSignalIds = new Set(allSignals.map(s => s.signalId).filter(Boolean));
                        changed = true;
                    }

                    if (changed) {
                        renderSignals(allSignals);
                        updateStats(allSignals);
                        saveCache();
                    }
                } catch (e) {}
                document.getElementById('lastUpdate').textContent = 'Updated: ' + new Date().toLocaleTimeString();
            }, 120000);
        }

        function renderSignals(signals) {
            const area = document.getElementById('signals-area');

            if (!signals || signals.length === 0) {
                area.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
                        </div>
                        <h3>No Published Signals Yet</h3>
                        <p>Signals are automatically published here as users generate them through the AI trading system.</p>
                    </div>`;
                return;
            }

            let html = '<div class="signals-grid">';
            signals.forEach(s => {
                const dirClass = (s.direction || s.signal || '').toUpperCase() === 'CALL' ? 'call' : 'put';
                const dirLabel = (s.direction || s.signal || '').toUpperCase();
                const resultClass = getResultClass(s.result);
                const resultLabel = (s.result || s.status || 'PENDING').toUpperCase();
                const confidence = s.confidence ? s.confidence + '%' : 'N/A';
                const signalTime = s.signalTime || 'N/A';
                const createdAt = formatDate(s.createdAt);
                const userName = s.user || 'User';
                const pairIcon = getPairIcon(s.pair);
                const newBadge = s.isNew ? '<span class="new-signal-badge">NEW</span>' : '';

                html += `
                <div class="signal-card">
                    ${newBadge}
                    <div class="card-top">
                        <div class="pair-info">
                            <div class="pair-icon">${pairIcon}</div>
                            <span class="pair-name">${escHtml(s.pair || 'Unknown')}</span>
                        </div>
                        <span class="direction-badge ${dirClass}">${dirLabel || 'N/A'}</span>
                    </div>
                    <div class="card-details">
                        <div class="detail-item">
                            <span class="detail-label">Confidence</span>
                            <span class="detail-value cyan">${escHtml(confidence)}</span>
                        </div>
                        <div class="detail-item">
                            <span class="detail-label">Signal Time</span>
                            <span class="detail-value">${escHtml(signalTime)}</span>
                        </div>
                    </div>
                    <div class="card-footer">
                        <span class="result-badge ${resultClass}">${resultLabel}</span>
                        <span class="user-tag">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                            ${escHtml(userName)}
                        </span>
                        <span class="created-date">${createdAt}</span>
                    </div>
                </div>`;
            });
            html += '</div>';
            area.innerHTML = html;
        }

        function updateStats(signals) {
            const statsEl = document.getElementById('signals-stats');
            if (!statsEl || signals.length === 0) return;

            const total = signals.length;
            const wins = signals.filter(s => s.result && s.result.toUpperCase() === 'WIN').length;
            const completed = signals.filter(s => s.result && ['WIN', 'LOSS'].includes(s.result.toUpperCase())).length;
            const winRate = completed > 0 ? Math.round((wins / completed) * 100) : 0;

            document.getElementById('stat-total').textContent = total;
            document.getElementById('stat-wins').textContent = wins;
            document.getElementById('stat-rate').textContent = winRate + '%';
            statsEl.style.display = 'flex';
        }

        function getPairIcon(pair) {
            if (!pair) return '📊';
            const p = pair.toUpperCase();
            if (p.includes('BTC') || p.includes('ETH') || p.includes('CRYPTO')) return '₿';
            if (p.includes('EUR') || p.includes('GBP') || p.includes('USD') || p.includes('JPY')) return '💱';
            if (p.includes('GOLD') || p.includes('XAU')) return '🥇';
            if (p.includes('OIL') || p.includes('CRUDE')) return '🛢️';
            return '📊';
        }

        function getResultClass(result) {
            if (!result) return 'pending';
            switch (result.toUpperCase()) {
                case 'WIN': return 'win';
                case 'LOSS': return 'loss';
                case 'INVALID': return 'invalid';
                case 'REFUNDED': return 'refunded';
                default: return 'pending';
            }
        }

        function formatDate(val) {
            if (!val) return '';
            try {
                let ts;
                if (val._seconds) ts = val._seconds * 1000;
                else if (val.seconds) ts = val.seconds * 1000;
                else ts = new Date(val).getTime();
                return new Date(ts).toLocaleDateString('en-US', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
            } catch (e) { return ''; }
        }

        function escHtml(str) {
            if (!str) return '';
            const d = document.createElement('div');
            d.textContent = str;
            return d.innerHTML;
        }
    </script>
    <script src="/sidebar-include.js" defer></script>
    <script src="/help-widget.js" defer></script>
</body>
</html>
