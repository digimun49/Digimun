<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="robots" content="noindex, nofollow">
  <title>Loss Recovery Status</title>
  <link rel="stylesheet" href="variables.css" />
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(to bottom right, #001f3f, #000814);
      color: white;
      text-align: center;
      padding: 30px;
    }
    .box {
      background: #111;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 0 10px #00ffc3;
      max-width: 500px;
      margin: auto;
    }
    .btn {
      display: block;
      background-color: #00ffc3;
      color: black;
      padding: 12px;
      text-decoration: none;
      margin: 10px auto;
      width: 80%;
      max-width: 300px;
      font-weight: bold;
      border-radius: 8px;
    }
    .btn:hover {
      background-color: #00e6b6;
    }
    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: #00ffc3;
      text-decoration: none;
      font-weight: 600;
      font-size: 14px;
      padding: 10px 16px;
      background: rgba(0,255,195,0.1);
      border: 1px solid rgba(0,255,195,0.3);
      border-radius: 10px;
      margin-bottom: 20px;
      transition: all 0.3s;
    }
    .back-btn:hover { background: rgba(0,255,195,0.2); }
    #approved-section {
      display: none;
    }
  </style>
</head>
<body>
  <a href="#" onclick="goBack(); return false;" class="back-btn">← Back</a>
  <script>function goBack(){if(window.history.length>1){window.history.back();}else{window.location.href='/';}}</script>
  <div class="box">
    <h2>Loss Recovery Request</h2>
    <p id="status-text">⏳ Your request is pending. Please contact admin for quick approval.</p>

    <!-- Buttons -->
    <a href="https://t.me/digimun49?text=Hi, I applied for loss recovery on Digimun." target="_blank" class="btn">📨 Contact via Telegram</a>

    <!-- Group Join (only visible when approved) -->
    <div id="approved-section">
      <p style="margin-top: 20px;">✅ You're approved! Join the private group for recovery:</p>
      <a href="https://t.me/+ZcYvVwiygYw0OGY8" target="_blank" class="btn" style="background-color:#0088cc; color:white;">🔒 Join Private Group</a>
    </div>
  </div>

  <script type="module">
    import { auth, db, doc, getDoc, onAuthStateChanged } from "./platform.js";

    onAuthStateChanged(auth, async (user) => {
      if (!user) return window.location.href = "/login";

      const userRef = doc(db, "users", (user.email || '').toLowerCase().trim());
      const userSnap = await getDoc(userRef);

      if (userSnap.exists()) {
        const data = userSnap.data();
        let recoveryStatus = data.recoveryRequest;
        
        // Check if time-limited recovery access has expired
        if (recoveryStatus === "approved" && data.recoveryRequestExpiry) {
          let expiryDate;
          if (data.recoveryRequestExpiry.toDate) {
            expiryDate = data.recoveryRequestExpiry.toDate();
          } else if (data.recoveryRequestExpiry.seconds) {
            expiryDate = new Date(data.recoveryRequestExpiry.seconds * 1000);
          } else {
            expiryDate = new Date(data.recoveryRequestExpiry);
          }
          
          if (expiryDate <= new Date()) {
            recoveryStatus = "pending";
          }
        }
        
        if (recoveryStatus === "approved") {
          document.getElementById("status-text").textContent = "🎉 Your loss recovery request has been approved!";
          document.getElementById("approved-section").style.display = "block";
        }
      }
    });
  </script>

  <script type="module" src="../need-help.js"></script>
  <script src="sidebar-include.js?v=20260310i" defer></script>
<script src="help-widget.js" defer></script>
</body>
</html>
