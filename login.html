/* ==== Forgot Link ==== */

/* ==== Primary Button ==== */

/* ==== OR Text ==== */

.google-btn:hover { background: #f5f5f5; border-color: #dcdcdc }

  <!-- Firebase & App Scripts -->
  <script type="module" src="firebase.js"></script>
  <script type="module" src="login.js"></script>

  <!-- Google Auth Script (must be in module) -->
  <script type="module">
    import { getAuth, signInWithPopup, GoogleAuthProvider } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { app } from "./firebase.js";

    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();

    const spinner = document.getElementById("loading-spinner-overlay");

    document.getElementById("google-login").addEventListener("click", () => {
      spinner.style.display = "flex";
      signInWithPopup(auth, provider)
        .then(result => {
          spinner.style.display = "none";
          document.getElementById("google-login-status").innerText = `Welcome, ${result.user.displayName}`;
          window.location.href = "chooseAccountType.html";
        })
        .catch(error => {
          spinner.style.display = "none";
          document.getElementById("google-login-status").innerText = "❌ Google login failed!";
          console.error(error);
        });
    });
  </script>

<script>
  function openPopup() {

  function closePopup() {
    document.getElementById("channel-popup").style.display = "none";
    document.getElementById("overlay-bg").style.display = "none";
  }

  // Auto-show on load
