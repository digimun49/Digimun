<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <meta name="robots" content="noindex, nofollow">
  <title>Digimun Pro — Signal Parser</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#080c14;
      --card:#0c1220;
      --card2:#0f1628;
      --ink:#e2ecf7;
      --muted:#6b7f99;
      --accent:#20e3b2;
      --accent-dim:rgba(32,227,178,.08);
      --border:#162035;
      --border-accent:rgba(32,227,178,.15);
      --mono: 'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      --sans: 'Inter', -apple-system, system-ui, sans-serif;
    }
    *{box-sizing:border-box}
    body{margin:0;background:var(--bg);color:var(--ink);font:14px/1.5 var(--sans);overflow-x:hidden}

    .wrap{max-width:1200px;margin:0 auto;padding:16px 18px 24px}

    .topbar{display:flex;align-items:center;justify-content:space-between;padding:10px 0 14px;border-bottom:1px solid var(--border);margin-bottom:16px}
    .topbar-left{display:flex;align-items:center;gap:10px}
    .back-link{color:var(--muted);text-decoration:none;font-size:13px;transition:color .2s}
    .back-link:hover{color:var(--accent)}
    .divider{width:1px;height:18px;background:var(--border)}
    .brand{display:flex;align-items:center;gap:8px}
    .logo{width:30px;height:30px;border-radius:8px;background:linear-gradient(135deg,var(--accent) 0%,#0fd1ff 100%);display:grid;place-items:center;box-shadow:0 4px 12px rgba(32,227,178,.2)}
    .logo span{font:700 12px/1 var(--sans);color:#001a16}
    .brand-text{font-size:14px;font-weight:600;color:var(--ink);letter-spacing:-.2px}
    .brand-sub{font-size:11px;color:var(--muted);font-weight:400}

    .toolbar{display:flex;flex-wrap:wrap;gap:8px;align-items:center;padding:12px 14px;background:var(--card);border:1px solid var(--border);border-radius:10px;margin-bottom:12px}
    .toolbar-group{display:flex;align-items:center;gap:6px}
    .toolbar-group label{font-size:11px;color:var(--muted);white-space:nowrap;text-transform:uppercase;letter-spacing:.5px;font-weight:500}
    .toolbar-sep{width:1px;height:24px;background:var(--border);margin:0 4px}
    .toolbar .spacer{flex:1}

    select,input[type="number"]{background:var(--card2);border:1px solid var(--border);border-radius:6px;color:var(--ink);padding:7px 10px;font:16px var(--sans);min-width:0}
    select:focus,input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 2px rgba(32,227,178,.1)}
    input,select,textarea,button{font-size:16px;touch-action:manipulation}

    .btn{border:0;border-radius:8px;padding:8px 14px;font-weight:600;font-size:13px;cursor:pointer;transition:all .15s ease;display:inline-flex;align-items:center;gap:4px}
    .btn-primary{background:var(--accent);color:#04241b}
    .btn-primary:hover{box-shadow:0 4px 16px rgba(32,227,178,.3);transform:translateY(-1px)}
    .btn-secondary{background:var(--card2);color:var(--ink);border:1px solid var(--border)}
    .btn-secondary:hover{border-color:var(--accent);color:var(--accent)}

    .main-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    @media(max-width:900px){.main-grid{grid-template-columns:1fr}}

    .panel{background:var(--card);border:1px solid var(--border);border-radius:10px;overflow:hidden}
    .panel-header{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-bottom:1px solid var(--border);background:var(--card2)}
    .panel-header span{font-size:11px;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);font-weight:600}
    .signal-count{font-size:11px;color:var(--accent);font-weight:600;font-family:var(--mono);letter-spacing:.3px}
    textarea{width:100%;min-height:380px;background:var(--bg);border:none;color:var(--ink);padding:14px;font:16px/1.5 var(--mono);resize:vertical;outline:none}
    textarea::placeholder{color:#2a3a55}

    .options-bar{display:flex;flex-wrap:wrap;gap:8px;align-items:center;padding:10px 14px;background:var(--card);border:1px solid var(--border);border-radius:10px;margin-bottom:12px}
    .toggle-label{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--muted);cursor:pointer;text-transform:uppercase;letter-spacing:.5px;font-weight:500}
    .toggle-label input[type="checkbox"]{width:16px;height:16px;accent-color:var(--accent);cursor:pointer}

    .advanced-toggle{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--muted);cursor:pointer;padding:6px 12px;background:var(--card2);border:1px solid var(--border);border-radius:6px;transition:all .2s}
    .advanced-toggle:hover{border-color:var(--accent);color:var(--accent)}
    .advanced-panel{display:none;padding:14px;border:1px solid var(--border);border-radius:10px;background:var(--card);margin-bottom:12px}
    .advanced-panel .row{display:flex;gap:12px;flex-wrap:wrap;align-items:center}
    .advanced-panel select{min-width:180px}
    .advanced-panel .hint{color:var(--muted);font-size:11px}
    @media(max-width:600px){
      .advanced-panel .row{flex-direction:column;align-items:stretch}
      .advanced-panel select{min-width:100%}
    }

    footer{padding:12px 0;color:var(--muted);font-size:11px;text-align:center;border-top:1px solid var(--border);margin-top:16px}

    .batch-card{background:var(--card);border:1px solid var(--border);border-radius:10px;margin-bottom:10px;overflow:hidden}
    .batch-card-header{display:flex;align-items:center;justify-content:space-between;padding:8px 14px;border-bottom:1px solid var(--border);background:var(--card2)}
    .batch-card-header span{font-size:11px;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);font-weight:600}
    .batch-card textarea{width:100%;min-height:180px;background:var(--bg);border:none;color:var(--ink);padding:14px;font:16px/1.5 var(--mono);resize:vertical;outline:none}

    @media(max-width:600px){
      .toolbar{gap:6px;padding:10px}
      .toolbar-sep{display:none}
      .topbar{flex-wrap:wrap;gap:8px}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <div class="topbar-left">
        <a href="#" onclick="goBack(); return false;" class="back-link">← Back</a>
        <div class="divider"></div>
        <div class="brand">
          <div class="logo" aria-hidden="true"><span>DP</span></div>
          <div>
            <div class="brand-text">Signal Parser</div>
            <div class="brand-sub">Digimun Pro</div>
          </div>
        </div>
      </div>
    </div>
    <script>function goBack(){if(window.history.length>1){window.history.back();}else{window.location.href='/';}}</script>

    <div class="toolbar">
      <div class="toolbar-group">
        <label>Adjust</label>
        <select id="adjustDirection" style="min-width:100px">
          <option value="add">+ Add</option>
          <option value="subtract" selected>− Subtract</option>
        </select>
        <input id="timeAdjust" type="number" min="0" max="1440" value="60" style="width:70px" placeholder="min" />
      </div>
      <div class="toolbar-sep"></div>
      <div class="toolbar-group">
        <label>Format</label>
        <select id="outputFormat" style="min-width:140px">
          <option value="clean" selected>PAIR TIME UP/DOWN</option>
          <option value="m1">TF;PAIR;TIME;DIR</option>
        </select>
      </div>
      <div class="toolbar-sep"></div>
      <div class="toolbar-group">
        <label>TF</label>
        <select id="timeframeSelect" style="min-width:60px">
          <option value="M1" selected>M1</option>
          <option value="M5">M5</option>
          <option value="M15">M15</option>
          <option value="M30">M30</option>
          <option value="H1">H1</option>
        </select>
      </div>
      <div class="toolbar-sep"></div>
      <label class="toggle-label">
        <input type="checkbox" id="keepSuperscript" checked>
        ¹²³
      </label>
      <div class="spacer"></div>
      <div class="toolbar-group">
        <button id="parseBtn" class="btn btn-primary" type="button">Parse</button>
        <button id="copyBtn" class="btn btn-secondary" type="button">Copy</button>
        <button id="clearBtn" class="btn btn-secondary" type="button">Clear</button>
      </div>
    </div>

    <div style="margin-bottom:12px">
      <div class="advanced-toggle" id="toggleAdvanced" role="button" aria-controls="advancedPanel" aria-expanded="false">
        <span>⏱</span> Timezone Converter
      </div>
    </div>

    <div id="advancedPanel" class="advanced-panel" aria-hidden="true">
      <div class="row">
        <div style="flex:1">
          <div class="hint">Source timezone</div>
          <select id="srcTz" aria-label="Source timezone" style="width:100%"></select>
        </div>
        <div style="flex:1">
          <div class="hint">Target timezone</div>
          <select id="dstTz" aria-label="Target timezone" style="width:100%"></select>
        </div>
        <button id="applyTz" class="btn btn-secondary" type="button">Apply</button>
      </div>
    </div>

    <div class="main-grid">
      <div class="panel">
        <div class="panel-header">
          <span>Input <span class="signal-count" id="inputCount"></span></span>
          <button id="pasteBtn" class="btn btn-secondary" type="button" style="padding:4px 10px;font-size:11px">Paste</button>
        </div>
        <textarea id="signalInput" spellcheck="false" placeholder="Paste signals here..."></textarea>
      </div>
      <div class="panel">
        <div class="panel-header">
          <span>Output <span class="signal-count" id="outputCount"></span></span>
        </div>
        <textarea id="signalOutput" spellcheck="false" placeholder="Parsed output..." readonly></textarea>
      </div>
    </div>

    <div style="margin-top:24px;border-top:1px solid var(--border);padding-top:20px">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px">
        <div class="logo" aria-hidden="true" style="width:28px;height:28px"><span style="font-size:10px">⏱</span></div>
        <div>
          <div class="brand-text">Signal Gap Filter</div>
          <div class="brand-sub">Minimum 5-min gap between signals</div>
        </div>
      </div>

      <div class="toolbar">
        <div class="toolbar-group">
          <label>Min Gap</label>
          <input id="gapMinutes" type="number" min="1" max="60" value="5" style="width:70px" />
          <label style="margin-left:2px">min</label>
        </div>
        <div class="spacer"></div>
        <div class="toolbar-group">
          <button id="filterBtn" class="btn btn-primary" type="button">Filter</button>
          <button id="filterCopyBtn" class="btn btn-secondary" type="button">Copy</button>
          <button id="filterClearBtn" class="btn btn-secondary" type="button">Clear</button>
        </div>
      </div>

      <div class="main-grid">
        <div class="panel">
          <div class="panel-header">
            <span>Input <span class="signal-count" id="filterInputCount"></span></span>
            <button id="filterPasteBtn" class="btn btn-secondary" type="button" style="padding:4px 10px;font-size:11px">Paste</button>
          </div>
          <textarea id="filterInput" spellcheck="false" placeholder="Paste parsed signals here (one per line)...
Example:
EURUSD 10:05 UP
GBPJPY 10:07 DOWN
AUDUSD 10:11 UP"></textarea>
        </div>
        <div class="panel">
          <div class="panel-header">
            <span>Filtered <span class="signal-count" id="filterOutputCount"></span></span>
            <span class="signal-count" id="filterSkipCount" style="color:var(--muted)"></span>
          </div>
          <textarea id="filterOutput" spellcheck="false" placeholder="Filtered signals will appear here..." readonly></textarea>
        </div>
      </div>
    </div>

    <div style="margin-top:24px;border-top:1px solid var(--border);padding-top:20px">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px">
        <div class="logo" aria-hidden="true" style="width:28px;height:28px"><span style="font-size:10px">✂</span></div>
        <div>
          <div class="brand-text">Signal Batch Splitter</div>
          <div class="brand-sub">Split signal list into batches with spacing</div>
        </div>
      </div>

      <div class="toolbar">
        <div class="toolbar-group">
          <label>Batch Size</label>
          <input id="batchSize" type="number" min="1" max="9999" value="145" style="width:80px" />
          <label style="margin-left:2px">signals</label>
        </div>
        <div class="spacer"></div>
        <div class="toolbar-group">
          <button id="splitBtn" class="btn btn-primary" type="button">Split</button>
          <button id="splitCopyBtn" class="btn btn-secondary" type="button">Copy All</button>
          <button id="splitClearBtn" class="btn btn-secondary" type="button">Clear</button>
        </div>
      </div>

      <div class="panel" style="margin-bottom:12px">
        <div class="panel-header">
          <span>Input <span class="signal-count" id="splitInputCount"></span></span>
          <button id="splitPasteBtn" class="btn btn-secondary" type="button" style="padding:4px 10px;font-size:11px">Paste</button>
        </div>
        <textarea id="splitInput" spellcheck="false" placeholder="Paste your full signal list here (one signal per line)..."></textarea>
      </div>
      <div id="splitBatchesContainer" style="display:none">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
          <span class="signal-count" id="splitOutputCount" style="font-size:12px"></span>
          <span class="signal-count" id="splitBatchInfo" style="color:var(--muted);font-size:12px"></span>
        </div>
        <div id="splitBatchesList"></div>
      </div>
    </div>

    <footer>© <span id="yr"></span> Digimun Pro</footer>
  </div>

<script>
  var $ = function(id) { return document.getElementById(id); };

  var inputEl = $('signalInput');
  var outputEl = $('signalOutput');
  var parseBtn = $('parseBtn');
  var copyBtn = $('copyBtn');
  var clearBtn = $('clearBtn');
  var pasteBtn = $('pasteBtn');
  var timeAdjustEl = $('timeAdjust');
  var adjustDirectionEl = $('adjustDirection');
  var toggleAdvanced = $('toggleAdvanced');
  var advancedPanel = $('advancedPanel');
  var srcTz = $('srcTz');
  var dstTz = $('dstTz');
  var applyTz = $('applyTz');
  var outputFormatEl = $('outputFormat');
  var timeframeEl = $('timeframeSelect');
  var keepSuperscriptEl = $('keepSuperscript');

  var inputCountEl = $('inputCount');
  var outputCountEl = $('outputCount');

  function countSignalLines(text) {
    if (!text.trim()) return 0;
    return text.split('\n').filter(function(l) { return l.trim().length > 0; }).length;
  }

  function updateInputCount() {
    var c = countSignalLines(inputEl.value);
    inputCountEl.textContent = c > 0 ? '· ' + c : '';
  }

  function updateOutputCount() {
    var c = countSignalLines(outputEl.value);
    outputCountEl.textContent = c > 0 ? '· ' + c : '';
  }

  $('yr').textContent = new Date().getFullYear();

  var tzList = [
    { label: 'UTC-12 Baker Island', offset: -12 },
    { label: 'UTC-11 Samoa', offset: -11 },
    { label: 'UTC-10 Hawaii', offset: -10 },
    { label: 'UTC-9 Alaska', offset: -9 },
    { label: 'UTC-8 Los Angeles', offset: -8 },
    { label: 'UTC-7 Denver', offset: -7 },
    { label: 'UTC-6 Chicago', offset: -6 },
    { label: 'UTC-5 New York / EST', offset: -5 },
    { label: 'UTC-4 Santiago', offset: -4 },
    { label: 'UTC-3 São Paulo / BRT', offset: -3 },
    { label: 'UTC-2 Mid-Atlantic', offset: -2 },
    { label: 'UTC-1 Azores', offset: -1 },
    { label: 'UTC+0 London / GMT', offset: 0 },
    { label: 'UTC+1 Paris / CET', offset: 1 },
    { label: 'UTC+2 Cairo / EET', offset: 2 },
    { label: 'UTC+3 Moscow / MSK', offset: 3 },
    { label: 'UTC+3:30 Tehran', offset: 3.5 },
    { label: 'UTC+4 Dubai / GST', offset: 4 },
    { label: 'UTC+4:30 Kabul', offset: 4.5 },
    { label: 'UTC+5 Karachi / PKT', offset: 5 },
    { label: 'UTC+5:30 Mumbai / IST', offset: 5.5 },
    { label: 'UTC+5:45 Kathmandu', offset: 5.75 },
    { label: 'UTC+6 Dhaka / BST', offset: 6 },
    { label: 'UTC+6:30 Yangon', offset: 6.5 },
    { label: 'UTC+7 Bangkok / ICT', offset: 7 },
    { label: 'UTC+8 Singapore / CST', offset: 8 },
    { label: 'UTC+9 Tokyo / JST', offset: 9 },
    { label: 'UTC+9:30 Adelaide', offset: 9.5 },
    { label: 'UTC+10 Sydney / AEST', offset: 10 },
    { label: 'UTC+11 Noumea', offset: 11 },
    { label: 'UTC+12 Auckland / NZST', offset: 12 },
    { label: 'UTC+13 Nuku\'alofa', offset: 13 },
  ];

  tzList.forEach(function(tz) {
    var opt1 = document.createElement('option');
    opt1.value = tz.offset;
    opt1.textContent = tz.label;
    srcTz.appendChild(opt1);

    var opt2 = document.createElement('option');
    opt2.value = tz.offset;
    opt2.textContent = tz.label;
    dstTz.appendChild(opt2);
  });

  srcTz.value = '-3';
  dstTz.value = '5';

  toggleAdvanced.addEventListener('click', function() {
    var open = advancedPanel.style.display === 'block';
    advancedPanel.style.display = open ? 'none' : 'block';
    toggleAdvanced.setAttribute('aria-expanded', !open);
    advancedPanel.setAttribute('aria-hidden', open);
  });

  applyTz.addEventListener('click', function() {
    var srcOffset = parseFloat(srcTz.value);
    var dstOffset = parseFloat(dstTz.value);
    var diff = dstOffset - srcOffset;
    var diffMinutes = Math.round(diff * 60);

    if (diffMinutes >= 0) {
      adjustDirectionEl.value = 'add';
    } else {
      adjustDirectionEl.value = 'subtract';
      diffMinutes = Math.abs(diffMinutes);
    }

    timeAdjustEl.value = diffMinutes;
    advancedPanel.style.display = 'none';
    toggleAdvanced.setAttribute('aria-expanded', 'false');
    advancedPanel.setAttribute('aria-hidden', 'true');
  });

  function smartParseSignals(inputText, offsetMinutes) {
    var lines = inputText.split('\n');
    var results = [];
    
    for (var i = 0; i < lines.length; i++) {
      var parsed = smartParseLine(lines[i], offsetMinutes);
      if (parsed) {
        results.push(parsed);
      }
    }
    
    return results.join('\n');
  }

  function smartParseLine(rawLine, offsetMinutes) {
    if (!rawLine || !rawLine.trim()) return null;
    
    var line = rawLine;
    
    var emojis = extractEmojis(line);
    line = removeEmojis(line);
    
    var avoidMatch = line.match(/\bAV[-\s]*(\d{1,2}[:.]\d{2})[\s!]*(\d{1,2}[:.]\d{2})/i);
    if (avoidMatch) {
      var time1 = avoidMatch[1].replace('.', ':');
      var time2 = avoidMatch[2].replace('.', ':');
      var t1Parts = time1.split(':').map(Number);
      var t2Parts = time2.split(':').map(Number);
      var t1Formatted = String(t1Parts[0]).padStart(2,'0') + ':' + String(t1Parts[1]).padStart(2,'0');
      var t2Formatted = String(t2Parts[0]).padStart(2,'0') + ':' + String(t2Parts[1]).padStart(2,'0');
      var adjTime1 = shiftTime(t1Formatted, offsetMinutes);
      var adjTime2 = shiftTime(t2Formatted, offsetMinutes);
      var emojiAvoid = processEmoji(emojis);
      var emojiPrefix = emojiAvoid ? emojiAvoid + ' ' : '';
      if (outputFormatEl.value === 'm1') {
        return (emojiPrefix + 'AVOID;' + adjTime1 + ';' + adjTime2).trim();
      }
      return (emojiPrefix + 'AVOID ' + adjTime1 + ' - ' + adjTime2).trim();
    }
    
    line = cleanLineAdvanced(line);
    
    if (!line) return null;
    
    var detectedKeyword = null;
    var keywords = ['GAP', 'TREND', 'DOJI', 'LW%'];
    for (var k = 0; k < keywords.length; k++) {
      var kw = keywords[k];
      var kwRe = new RegExp('\\b' + kw.replace('%', '\\%') + '\\b', 'i');
      if (kwRe.test(line)) {
        detectedKeyword = kw;
        break;
      }
    }
    
    var timeMatch = extractTime(line);
    if (!timeMatch) return null;
    
    var adjustedTime = shiftTime(timeMatch.time, offsetMinutes);
    
    var pair = extractPair(line, timeMatch.time);
    if (!pair) return null;
    
    if (detectedKeyword) {
      return formatOutputLine(pair, adjustedTime, null, emojis, detectedKeyword);
    }
    
    var direction = extractDirection(line);
    if (!direction) return null;
    
    return formatOutputLine(pair, adjustedTime, direction, emojis, null);
  }

  function extractEmojis(text) {
    var superRe = /[\u00B9\u00B2\u00B3\u2070\u2074\u2075\u2076\u2077\u2078\u2079]/g;
    var superMatches = text.match(superRe);
    var superStr = superMatches ? superMatches.join('') : '';
    
    var emojiRe = /[\u{1F300}-\u{1F9FF}\u{2600}-\u{27BF}\u{2300}-\u{23FF}\u{2B50}\u{2702}-\u{27B0}\u{FE00}-\u{FE0F}\u{200D}\u{20E3}\u{E0020}-\u{E007F}\u{1FA00}-\u{1FA6F}\u{1FA70}-\u{1FAFF}]/gu;
    var emojiMatches = text.match(emojiRe);
    
    if (!emojiMatches && !superStr) return null;
    
    var emojiStr = emojiMatches ? emojiMatches.join('') : '';
    return (emojiStr + superStr) || null;
  }

  function removeEmojis(text) {
    return text
      .replace(/[\u{1F300}-\u{1F9FF}\u{2600}-\u{27BF}\u{2300}-\u{23FF}\u{2B50}\u{2702}-\u{27B0}\u{FE00}-\u{FE0F}\u{200D}\u{20E3}\u{E0020}-\u{E007F}\u{1FA00}-\u{1FA6F}\u{1FA70}-\u{1FAFF}\u{200B}-\u{200F}\u{2028}-\u{202F}\u{2060}-\u{206F}\u{FEFF}\u{FFF0}-\u{FFFF}]/gu, ' ')
      .replace(/[\u00B9\u00B2\u00B3\u2070\u2074\u2075\u2076\u2077\u2078\u2079]/g, '')
      .replace(/\s+/g, ' ')
      .trim();
  }

  function cleanLineAdvanced(s) {
    var cleaned = s
      .replace(/[\u200E\u200F\uFEFF\u200B-\u200D\u00A0]/g, ' ')
      .replace(/[□▪▫●○◆◇■◾◽•‣⁃→←↑↓↔⇒⇐⇑⇓≈≡≠≤≥<>«»‹›@#$^&*~`|\\{}[\]]/g, ' ')
      .replace(/M\d+\s*;/gi, ' ')
      .replace(/M\d+\b/gi, ' ')
      .replace(/[;,]+/g, ' ')
      .replace(/_/g, ' ')
      .replace(/\b[a-z]\b/g, ' ')
      .replace(/\s+/g, ' ')
      .trim();
    
    return cleaned;
  }

  function extractTime(line) {
    var timePatterns = [
      /\b([01]?\d|2[0-3]):([0-5]\d)\b/,
      /\b([01]?\d|2[0-3])\.([0-5]\d)\b/,
    ];
    
    for (var i = 0; i < timePatterns.length; i++) {
      var match = line.match(timePatterns[i]);
      if (match) {
        var hours = match[1].padStart(2, '0');
        var minutes = match[2].padStart(2, '0');
        return {
          time: hours + ':' + minutes,
          original: match[0]
        };
      }
    }
    
    return null;
  }

  function shiftTime(hhmm, offsetMinutes) {
    var parts = hhmm.split(':').map(Number);
    var total = parts[0] * 60 + parts[1] + offsetMinutes;
    total = ((total % 1440) + 1440) % 1440;
    var nh = String(Math.floor(total / 60)).padStart(2, '0');
    var nm = String(total % 60).padStart(2, '0');
    return nh + ':' + nm;
  }

  function extractPair(line, time) {
    var workLine = line.replace(time, ' ').replace(/\./g, ':');
    
    workLine = workLine.replace(/\b(CALLS?|CALS?|PUTS?|UP|DOWN|DN|BUYS?|SELLS?|GAP|AVOID|TREND|LW%|DOJI)\b/gi, ' ');
    
    var pairPatterns = [
      /\b([A-Z]{6})\s*[-\s]?\s*(OTC)\b/i,
      /\b([A-Z]{3,5}[A-Z]{3})\s*[-\s]?\s*(OTC)\b/i,
      /\b([A-Z]{3}\/[A-Z]{3})\s*[-\s]?\s*(OTC)\b/i,
      /\b([A-Z]{2,5})\s+[-]?\s*(OTC)\b/i,
      /\b([A-Z]{2,5})\s*-(OTC)\b/i,
      /\b([A-Z]{6})\b/i,
      /\b([A-Z]{3,5}[A-Z]{3})\b/i,
      /\b([A-Z]{3}\/[A-Z]{3})\b/i,
      /\b([A-Z]{3,8}USD|USD[A-Z]{3,5})\b/i,
      /\b(BTC|ETH|XRP|LTC|BCH|ADA|DOT|LINK|XLM|DOGE|SOL|AVAX|MATIC|SHIB|UNI|ATOM|FIL|TRX|ETC|XMR|NEO|VET|ALGO|FTM|SAND|MANA|AXS|THETA|ICP|AAVE|MKR|COMP|GRT|SNX|SUSHI|YFI|CRV|BAT|ENJ|ZIL|HBAR|EGLD|NEAR|RUNE|KAVA|ONE|ZRX|WAVES|QTUM|OMG|ZEC|DASH|XTZ)[A-Z]*\b/i,
    ];
    
    var hasOTC = false;
    var otcCheck = line.toUpperCase();
    if (otcCheck.includes('OTC') || otcCheck.includes('-OTC') || otcCheck.includes(' OTC')) {
      hasOTC = true;
    }
    
    for (var i = 0; i < pairPatterns.length; i++) {
      var match = workLine.match(pairPatterns[i]);
      if (match) {
        var pairName = match[1].toUpperCase().replace('/', '');
        
        if (match[2] && match[2].toUpperCase() === 'OTC') {
          return pairName + ' OTC';
        }
        
        if (hasOTC) {
          return pairName + ' OTC';
        }
        
        return pairName;
      }
    }
    
    return null;
  }

  function extractDirection(line) {
    var dirPatterns = [
      /\b(CALL)s?\b/i,
      /\b(CAL)s?\b/i,
      /\b(PUT)s?\b/i,
      /\b(UP)\b/i,
      /\b(DOWN)\b/i,
      /\b(DN)\b/i,
      /\b(BUY)s?\b/i,
      /\b(SELL)s?\b/i,
    ];
    
    for (var i = 0; i < dirPatterns.length; i++) {
      var match = line.match(dirPatterns[i]);
      if (match) {
        return match[1].toUpperCase();
      }
    }
    
    var stripped = line.replace(/[^A-Za-z0-9\s:.\-\/]/g, ' ').replace(/\s+/g, ' ');
    for (var j = 0; j < dirPatterns.length; j++) {
      var match2 = stripped.match(dirPatterns[j]);
      if (match2) {
        return match2[1].toUpperCase();
      }
    }
    
    return null;
  }

  function normalizeDirection(dir) {
    var upper = dir.toUpperCase();
    if (upper === 'CALL' || upper === 'CAL' || upper === 'BUY') return 'UP';
    if (upper === 'PUT' || upper === 'DN' || upper === 'SELL') return 'DOWN';
    return upper;
  }

  function reverseDirection(dir) {
    var upper = dir.toUpperCase();
    if (upper === 'UP' || upper === 'CALL' || upper === 'CAL' || upper === 'BUY') return 'CALL';
    if (upper === 'DOWN' || upper === 'PUT' || upper === 'DN' || upper === 'SELL') return 'PUT';
    return upper;
  }

  function stripSuperscripts(text) {
    return text.replace(/[\u00B9\u00B2\u00B3\u2070\u2074\u2075\u2076\u2077\u2078\u2079]/g, '');
  }

  function processEmoji(emojis) {
    var e = emojis || '';
    if (e && !keepSuperscriptEl.checked) {
      e = stripSuperscripts(e);
    }
    e = e.replace(/[\uFE0F\u200D\u200B]/g, '').trim();
    return e;
  }

  function formatOutputLine(pair, time, direction, emojis, keyword) {
    var fmt = outputFormatEl.value;
    var emojiPart = processEmoji(emojis);
    var emojiPrefix = emojiPart ? emojiPart + ' ' : '';

    if (keyword) {
      if (fmt === 'm1') {
        var tf = timeframeEl.value;
        var pairM1 = pair.replace(/\s+OTC$/, '-OTC').replace(/\s+/g, '');
        return (emojiPrefix + tf + ';' + pairM1 + ';' + time + ';' + keyword).trim();
      }
      return (emojiPrefix + pair + ' ' + time + ' ' + keyword).trim();
    }

    if (fmt === 'm1') {
      var tf2 = timeframeEl.value;
      var pairM1b = pair.replace(/\s+OTC$/, '-OTC').replace(/\s+/g, '');
      var brokerDir = reverseDirection(direction);
      return (emojiPrefix + tf2 + ';' + pairM1b + ';' + time + ';' + brokerDir).trim();
    }

    var cleanDir = normalizeDirection(direction);
    return (emojiPrefix + pair + ' ' + time + ' ' + cleanDir).trim();
  }

  inputEl.addEventListener('input', updateInputCount);

  parseBtn.addEventListener('click', function() {
    var adjustMinutes = parseInt(timeAdjustEl.value, 10) || 0;
    var direction = adjustDirectionEl.value;
    var offset = direction === 'subtract' ? -adjustMinutes : adjustMinutes;
    
    outputEl.value = smartParseSignals(inputEl.value, offset);
    updateInputCount();
    updateOutputCount();
  });

  copyBtn.addEventListener('click', function() {
    navigator.clipboard.writeText(outputEl.value).then(function() {
      copyBtn.textContent = '✓ Copied';
      setTimeout(function() { copyBtn.textContent = 'Copy'; }, 1500);
    }).catch(function() {
      outputEl.select();
      document.execCommand('copy');
      copyBtn.textContent = '✓ Copied';
      setTimeout(function() { copyBtn.textContent = 'Copy'; }, 1500);
    });
  });

  clearBtn.addEventListener('click', function() {
    inputEl.value = '';
    outputEl.value = '';
    updateInputCount();
    updateOutputCount();
  });

  pasteBtn.addEventListener('click', function() {
    navigator.clipboard.readText().then(function(t) {
      inputEl.value = t;
      updateInputCount();
    }).catch(function() {});
  });

  var filterInput = $('filterInput');
  var filterOutput = $('filterOutput');
  var filterBtn = $('filterBtn');
  var filterCopyBtn = $('filterCopyBtn');
  var filterClearBtn = $('filterClearBtn');
  var filterPasteBtn = $('filterPasteBtn');
  var gapMinutesEl = $('gapMinutes');
  var filterInputCountEl = $('filterInputCount');
  var filterOutputCountEl = $('filterOutputCount');
  var filterSkipCountEl = $('filterSkipCount');

  function updateFilterInputCount() {
    var c = countSignalLines(filterInput.value);
    filterInputCountEl.textContent = c > 0 ? '· ' + c : '';
  }

  function updateFilterOutputCount(accepted, skipped) {
    filterOutputCountEl.textContent = accepted > 0 ? '· ' + accepted : '';
    filterSkipCountEl.textContent = skipped > 0 ? skipped + ' skipped' : '';
  }

  filterInput.addEventListener('input', updateFilterInputCount);

  function extractTimeFromLine(line) {
    var m = line.match(/\b([01]?\d|2[0-3]):([0-5]\d)\b/);
    if (m) {
      return parseInt(m[1], 10) * 60 + parseInt(m[2], 10);
    }
    return null;
  }

  filterBtn.addEventListener('click', function() {
    var minGap = parseInt(gapMinutesEl.value, 10) || 5;
    var lines = filterInput.value.split('\n');
    var signals = [];

    for (var i = 0; i < lines.length; i++) {
      var line = lines[i].trim();
      if (!line) continue;
      var timeMin = extractTimeFromLine(line);
      if (timeMin === null) continue;
      signals.push({ line: line, time: timeMin });
    }

    signals.sort(function(a, b) { return a.time - b.time; });

    var seen = {};
    var unique = [];
    for (var j = 0; j < signals.length; j++) {
      var key = signals[j].line;
      if (!seen[key]) {
        seen[key] = true;
        unique.push(signals[j]);
      }
    }

    var sameTimeSeen = {};
    var deduped = [];
    for (var k = 0; k < unique.length; k++) {
      if (!sameTimeSeen[unique[k].time]) {
        sameTimeSeen[unique[k].time] = true;
        deduped.push(unique[k]);
      }
    }

    var accepted = [];
    var lastAcceptedTime = null;

    for (var n = 0; n < deduped.length; n++) {
      var sig = deduped[n];
      if (lastAcceptedTime === null) {
        accepted.push(sig.line);
        lastAcceptedTime = sig.time;
      } else {
        var diff = sig.time - lastAcceptedTime;
        if (diff >= minGap) {
          accepted.push(sig.line);
          lastAcceptedTime = sig.time;
        }
      }
    }

    var skipped = signals.length - accepted.length;
    filterOutput.value = accepted.join('\n');
    updateFilterInputCount();
    updateFilterOutputCount(accepted.length, skipped);
  });

  filterCopyBtn.addEventListener('click', function() {
    navigator.clipboard.writeText(filterOutput.value).then(function() {
      filterCopyBtn.textContent = '✓ Copied';
      setTimeout(function() { filterCopyBtn.textContent = 'Copy'; }, 1500);
    }).catch(function() {
      filterOutput.select();
      document.execCommand('copy');
      filterCopyBtn.textContent = '✓ Copied';
      setTimeout(function() { filterCopyBtn.textContent = 'Copy'; }, 1500);
    });
  });

  filterClearBtn.addEventListener('click', function() {
    filterInput.value = '';
    filterOutput.value = '';
    updateFilterInputCount();
    updateFilterOutputCount(0, 0);
  });

  filterPasteBtn.addEventListener('click', function() {
    navigator.clipboard.readText().then(function(t) {
      filterInput.value = t;
      updateFilterInputCount();
    }).catch(function() {});
  });

  var splitInput = $('splitInput');
  var splitBtn = $('splitBtn');
  var splitCopyBtn = $('splitCopyBtn');
  var splitClearBtn = $('splitClearBtn');
  var splitPasteBtn = $('splitPasteBtn');
  var batchSizeEl = $('batchSize');
  var splitInputCountEl = $('splitInputCount');
  var splitOutputCountEl = $('splitOutputCount');
  var splitBatchInfoEl = $('splitBatchInfo');
  var splitBatchesContainer = $('splitBatchesContainer');
  var splitBatchesList = $('splitBatchesList');

  function updateSplitInputCount() {
    var c = countSignalLines(splitInput.value);
    splitInputCountEl.textContent = c > 0 ? '· ' + c : '';
  }

  splitInput.addEventListener('input', updateSplitInputCount);

  function copyBatchText(btn, textareaId) {
    var ta = document.getElementById(textareaId);
    if (!ta) return;
    var text = ta.value;
    navigator.clipboard.writeText(text).then(function() {
      btn.textContent = '✓ Copied';
      setTimeout(function() { btn.textContent = 'Copy'; }, 1500);
    }).catch(function() {
      ta.select();
      document.execCommand('copy');
      btn.textContent = '✓ Copied';
      setTimeout(function() { btn.textContent = 'Copy'; }, 1500);
    });
  }

  splitBtn.addEventListener('click', function() {
    var batchSize = parseInt(batchSizeEl.value, 10) || 145;
    if (batchSize < 1) batchSize = 1;

    var lines = splitInput.value.split('\n');
    var signals = [];
    for (var i = 0; i < lines.length; i++) {
      var line = lines[i].trim();
      if (line) signals.push(line);
    }

    splitBatchesList.innerHTML = '';

    if (signals.length === 0) {
      splitBatchesContainer.style.display = 'none';
      splitOutputCountEl.textContent = '';
      splitBatchInfoEl.textContent = '';
      return;
    }

    var batches = [];
    for (var j = 0; j < signals.length; j += batchSize) {
      batches.push(signals.slice(j, j + batchSize));
    }

    for (var k = 0; k < batches.length; k++) {
      var card = document.createElement('div');
      card.className = 'batch-card';

      var header = document.createElement('div');
      header.className = 'batch-card-header';

      var startNum = k * batchSize + 1;
      var endNum = Math.min((k + 1) * batchSize, signals.length);

      var titleSpan = document.createElement('span');
      titleSpan.textContent = 'Batch ' + (k + 1) + ' — signals ' + startNum + '-' + endNum + ' (' + batches[k].length + ')';
      titleSpan.style.color = 'var(--accent)';

      var copyBtnEl = document.createElement('button');
      copyBtnEl.className = 'btn btn-secondary';
      copyBtnEl.type = 'button';
      copyBtnEl.textContent = 'Copy';
      copyBtnEl.style.cssText = 'padding:4px 10px;font-size:11px';
      var taId = 'splitBatchTA_' + k;
      copyBtnEl.setAttribute('data-ta', taId);
      copyBtnEl.addEventListener('click', function() {
        copyBatchText(this, this.getAttribute('data-ta'));
      });

      header.appendChild(titleSpan);
      header.appendChild(copyBtnEl);
      card.appendChild(header);

      var ta = document.createElement('textarea');
      ta.id = taId;
      ta.spellcheck = false;
      ta.value = batches[k].join('\n');
      var lineCount = batches[k].length;
      var calcHeight = Math.min(Math.max(lineCount * 24 + 28, 100), 400);
      ta.style.minHeight = calcHeight + 'px';
      card.appendChild(ta);

      splitBatchesList.appendChild(card);
    }

    splitBatchesContainer.style.display = 'block';
    splitOutputCountEl.textContent = 'Total: ' + signals.length + ' signals';
    splitBatchInfoEl.textContent = batches.length + ' batch' + (batches.length > 1 ? 'es' : '') + ' of ' + batchSize;
  });

  splitCopyBtn.addEventListener('click', function() {
    var allTextareas = splitBatchesList.querySelectorAll('textarea');
    var parts = [];
    for (var i = 0; i < allTextareas.length; i++) {
      var val = allTextareas[i].value.trim();
      if (val) parts.push(val);
    }
    var fullText = parts.join('\n\n');
    navigator.clipboard.writeText(fullText).then(function() {
      splitCopyBtn.textContent = '✓ Copied All';
      setTimeout(function() { splitCopyBtn.textContent = 'Copy All'; }, 1500);
    }).catch(function() {
      splitCopyBtn.textContent = '✓ Copied All';
      setTimeout(function() { splitCopyBtn.textContent = 'Copy All'; }, 1500);
    });
  });

  splitClearBtn.addEventListener('click', function() {
    splitInput.value = '';
    splitBatchesList.innerHTML = '';
    splitBatchesContainer.style.display = 'none';
    splitInputCountEl.textContent = '';
    splitOutputCountEl.textContent = '';
    splitBatchInfoEl.textContent = '';
  });

  splitPasteBtn.addEventListener('click', function() {
    navigator.clipboard.readText().then(function(t) {
      splitInput.value = t;
      updateSplitInputCount();
    }).catch(function() {});
  });
</script>
</body>
</html>
