<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Payment Submissions</title>
  <style>
    body { background: #000814; color: white; font-family: Arial; padding: 20px; }
    table { width: 100%; border-collapse: collapse; background: #001122; margin-top: 20px; }
    th, td { padding: 12px; border: 1px solid #002233; text-align: center; }
    th { background: #002f3f; color: #00ffc3; }
  </style>
</head>
<body>
  <h2>📄 Payment Submissions</h2>
  <table id="payment-table">
    <thead>
      <tr>
        <th>Email</th>
        <th>Trader ID</th>
        <th>Transaction ID</th>
        <th>Submitted At</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "YOUR_API_KEY",
      authDomain: "YOUR_AUTH_DOMAIN",
      projectId: "YOUR_PROJECT_ID",
      storageBucket: "YOUR_BUCKET",
      messagingSenderId: "YOUR_ID",
      appId: "YOUR_APP_ID"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const tableBody = document.querySelector("tbody");

    async function loadPayments() {
      const snapshot = await getDocs(collection(db, "payments"));
      snapshot.forEach(doc => {
        const data = doc.data();
        const row = document.createElement("tr");
        row.innerHTML = `
          <td>${data.email}</td>
          <td>${data.traderId}</td>
          <td>${data.transactionId}</td>
          <td>${data.submittedAt?.toDate().toLocaleString() || "N/A"}</td>
        `;
        tableBody.appendChild(row);
      });
    }

    loadPayments();
  </script>
  <script src="sidebar-include.js"></script>
</body>
</html>
