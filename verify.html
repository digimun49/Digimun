<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Digimun Pro - Verify Action</title>
  <link rel="icon" type="image/png" href="/assets/favicon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #0a0f1a 0%, #111827 50%, #0a0f1a 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      color: #fff;
    }
    
    .verify-container {
      background: rgba(17, 24, 39, 0.95);
      border: 1px solid rgba(0, 245, 196, 0.15);
      border-radius: 16px;
      padding: 40px 32px;
      max-width: 420px;
      width: 100%;
      text-align: center;
    }
    
    .logo {
      width: 60px;
      height: 60px;
      margin-bottom: 24px;
    }
    
    h1 {
      font-size: 22px;
      font-weight: 600;
      margin-bottom: 8px;
      color: #fff;
    }
    
    .subtitle {
      font-size: 14px;
      color: rgba(255,255,255,0.6);
      margin-bottom: 28px;
    }
    
    .form-group {
      margin-bottom: 16px;
      text-align: left;
    }
    
    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: rgba(255,255,255,0.8);
      margin-bottom: 6px;
    }
    
    .form-group input {
      width: 100%;
      padding: 12px 14px;
      background: rgba(0,0,0,0.3);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      color: #fff;
      font-size: 14px;
      transition: border-color 0.2s;
    }
    
    .form-group input:focus {
      outline: none;
      border-color: #00F5C4;
    }
    
    .btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #00F5C4 0%, #00C49A 100%);
      border: none;
      border-radius: 8px;
      color: #000;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s, opacity 0.2s;
      margin-top: 8px;
    }
    
    .btn:hover { transform: translateY(-1px); }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
    
    .status-message {
      margin-top: 16px;
      padding: 12px;
      border-radius: 8px;
      font-size: 13px;
      display: none;
    }
    
    .status-message.success {
      display: block;
      background: rgba(0, 245, 196, 0.1);
      border: 1px solid rgba(0, 245, 196, 0.3);
      color: #00F5C4;
    }
    
    .status-message.error {
      display: block;
      background: rgba(255, 107, 107, 0.1);
      border: 1px solid rgba(255, 107, 107, 0.3);
      color: #ff6b6b;
    }
    
    .back-link {
      display: inline-block;
      margin-top: 20px;
      color: rgba(255,255,255,0.5);
      font-size: 13px;
      text-decoration: none;
      transition: color 0.2s;
    }
    
    .back-link:hover { color: #00F5C4; }
    
    .loading {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }
    
    .loading.visible { display: flex; }
    
    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(0, 245, 196, 0.2);
      border-top-color: #00F5C4;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    #reset-form, #verification-result, #error-result { display: none; }
  </style>
</head>
<body>
  <div class="verify-container">
    <img src="/assets/digimun-logo-transparent.png" alt="Digimun Pro" class="logo" />
    
    <div id="loading" class="loading visible">
      <div class="spinner"></div>
      <p style="color: rgba(255,255,255,0.6); font-size: 14px;">Verifying your request...</p>
    </div>
    
    <div id="reset-form">
      <h1>Reset Your Password</h1>
      <p class="subtitle">Enter your new password below</p>
      
      <div class="form-group">
        <label for="new-password">New Password</label>
        <input type="password" id="new-password" placeholder="Enter new password" required minlength="6" />
      </div>
      
      <div class="form-group">
        <label for="confirm-password">Confirm Password</label>
        <input type="password" id="confirm-password" placeholder="Confirm new password" required />
      </div>
      
      <button type="button" id="reset-btn" class="btn">Reset Password</button>
      <div id="reset-status" class="status-message"></div>
    </div>
    
    <div id="verification-result">
      <h1>Email Verified!</h1>
      <p class="subtitle">Your email has been successfully verified.</p>
      <div class="status-message success">You can now access all features of your account.</div>
      <a href="/login" class="btn" style="display: inline-block; text-decoration: none; margin-top: 16px;">Go to Login</a>
    </div>
    
    <div id="error-result">
      <h1>Something Went Wrong</h1>
      <p class="subtitle">This link may have expired or already been used.</p>
      <div id="error-message" class="status-message error"></div>
      <a href="/login" class="back-link">Back to Login</a>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { 
      getAuth, 
      applyActionCode, 
      verifyPasswordResetCode, 
      confirmPasswordReset 
    } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyACACrfmp0EpnsuVClv57VmDz5uMQ39qdM",
      authDomain: "digimun-49.firebaseapp.com",
      projectId: "digimun-49",
      storageBucket: "digimun-49.appspot.com",
      messagingSenderId: "369805638498",
      appId: "1:369805638498:web:9f74b3c2f1e6f5a8c8d9e0"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    const urlParams = new URLSearchParams(window.location.search);
    const mode = urlParams.get('mode');
    const oobCode = urlParams.get('oobCode');

    const loadingEl = document.getElementById('loading');
    const resetFormEl = document.getElementById('reset-form');
    const verificationResultEl = document.getElementById('verification-result');
    const errorResultEl = document.getElementById('error-result');
    const errorMessageEl = document.getElementById('error-message');

    function showError(message) {
      loadingEl.classList.remove('visible');
      errorResultEl.style.display = 'block';
      errorMessageEl.textContent = message;
      errorMessageEl.classList.add('error');
    }

    async function handleAction() {
      if (!oobCode) {
        showError('Invalid or missing verification code.');
        return;
      }

      try {
        switch (mode) {
          case 'resetPassword':
            await verifyPasswordResetCode(auth, oobCode);
            loadingEl.classList.remove('visible');
            resetFormEl.style.display = 'block';
            setupPasswordReset();
            break;

          case 'verifyEmail':
            await applyActionCode(auth, oobCode);
            loadingEl.classList.remove('visible');
            verificationResultEl.style.display = 'block';
            break;

          case 'recoverEmail':
            await applyActionCode(auth, oobCode);
            loadingEl.classList.remove('visible');
            verificationResultEl.style.display = 'block';
            document.querySelector('#verification-result h1').textContent = 'Email Recovered!';
            document.querySelector('#verification-result .subtitle').textContent = 'Your email has been successfully recovered.';
            break;

          default:
            showError('Unknown action. Please try again or contact support.');
        }
      } catch (error) {
        console.error('Action error:', error);
        let message = 'This link has expired or already been used.';
        if (error.code === 'auth/invalid-action-code') {
          message = 'This link has expired or already been used. Please request a new one.';
        } else if (error.code === 'auth/expired-action-code') {
          message = 'This link has expired. Please request a new password reset.';
        }
        showError(message);
      }
    }

    function setupPasswordReset() {
      const resetBtn = document.getElementById('reset-btn');
      const newPasswordInput = document.getElementById('new-password');
      const confirmPasswordInput = document.getElementById('confirm-password');
      const statusEl = document.getElementById('reset-status');

      resetBtn.addEventListener('click', async () => {
        const newPassword = newPasswordInput.value;
        const confirmPassword = confirmPasswordInput.value;

        statusEl.style.display = 'none';
        statusEl.classList.remove('success', 'error');

        if (!newPassword || newPassword.length < 6) {
          statusEl.textContent = 'Password must be at least 6 characters.';
          statusEl.classList.add('error');
          statusEl.style.display = 'block';
          return;
        }

        if (newPassword !== confirmPassword) {
          statusEl.textContent = 'Passwords do not match.';
          statusEl.classList.add('error');
          statusEl.style.display = 'block';
          return;
        }

        resetBtn.disabled = true;
        resetBtn.textContent = 'Resetting...';

        try {
          await confirmPasswordReset(auth, oobCode, newPassword);
          statusEl.textContent = 'Password reset successful! Redirecting to login...';
          statusEl.classList.add('success');
          statusEl.style.display = 'block';
          
          setTimeout(() => {
            window.location.href = '/login';
          }, 2000);
        } catch (error) {
          console.error('Reset error:', error);
          let message = 'Failed to reset password. Please try again.';
          if (error.code === 'auth/weak-password') {
            message = 'Password is too weak. Use at least 6 characters.';
          } else if (error.code === 'auth/expired-action-code') {
            message = 'This link has expired. Please request a new password reset.';
          }
          statusEl.textContent = message;
          statusEl.classList.add('error');
          statusEl.style.display = 'block';
          resetBtn.disabled = false;
          resetBtn.textContent = 'Reset Password';
        }
      });
    }

    handleAction();
  </script>
</body>
</html>
