[build]
  environment = { SECRETS_SCAN_SMART_DETECTION_ENABLED = "false", NODE_VERSION = "18" }

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"
  external_node_modules = ["firebase-admin"]

[functions."crypto-create-invoice"]
  timeout = 26

[functions."crypto-ipn-webhook"]
  timeout = 26

[functions."expire-time-limited-access"]
  schedule = "@hourly"

[functions."ticket-auto-manage"]
  schedule = "0 */6 * * *"

[[headers]]
  for = "/mxpanel49d*"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Pragma = "no-cache"

[[headers]]
  for = "/messaging-sw.js"
  [headers.values]
    Content-Security-Policy = "default-src 'self'; script-src 'self' https://www.gstatic.com https://cdn.jsdelivr.net https://cdnjs.cloudflare.com; connect-src 'self' https://*.googleapis.com https://*.firebaseio.com wss://*.firebaseio.com"
    Cache-Control = "no-cache, no-store, must-revalidate"
    Service-Worker-Allowed = "/"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=604800, stale-while-revalidate=86400"
    Vary = "Accept-Encoding"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=604800, stale-while-revalidate=86400"
    Vary = "Accept-Encoding"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Content-Type = "application/xml"
    Cache-Control = "public, max-age=3600, must-revalidate"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=()"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://www.gstatic.com https://apis.google.com https://www.googletagmanager.com https://www.google-analytics.com https://cdnjs.cloudflare.com https://cdn.jsdelivr.net https://www.google.com/recaptcha/ https://www.gstatic.com/recaptcha/ https://static.cloudflareinsights.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https: blob:; connect-src 'self' https://www.google-analytics.com https://www.googletagmanager.com https://*.netlify.app https://*.firebaseio.com wss://*.firebaseio.com https://*.googleapis.com https://*.firebasestorage.app https://*.cloudfunctions.net https://api.nowpayments.io https://static.cloudflareinsights.com https://www.google.com/recaptcha/ https://www.recaptcha.net https://*.replit.app; frame-src https://digimun-49.firebaseapp.com https://www.google.com https://accounts.google.com https://recaptcha.google.com/recaptcha/ https://www.recaptcha.net; object-src 'none'; base-uri 'self'; form-action 'self' https://*.netlify.app; worker-src 'self' blob:"

# Redirect rules for SPA-like pages
[[redirects]]
  from = "/digimunx"
  to = "/digimunx/index.html"
  status = 200

[[redirects]]
  from = "/digimunx/"
  to = "/digimunx/index.html"
  status = 200

[[redirects]]
  from = "/digimunx/*"
  to = "/digimunx/index.html"
  status = 200
