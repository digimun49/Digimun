<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Privacy Policy</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .policy-container {
      max-width: 800px;
      margin: 60px auto;
      padding: 20px;
      background-color: #0b1e2d;
      color: #ffffff;
      font-family: Arial, sans-serif;
      border-radius: 8px;
      box-shadow: 0 0 10px rgba(0, 255, 195, 0.2);
    }

    .policy-container h2 {
      text-align: center;
      color: #00ffc3;
      margin-bottom: 20px;
    }

    .policy-container p {
      font-size: 16px;
      line-height: 1.6;
      margin-bottom: 16px;
    }

    @media (max-width: 600px) {
      .policy-container {
        margin: 20px;
        padding: 15px;
      }
    }
  </style>
</head>
<body class="signal-body">
  <div class="policy-container">
    <h2>Privacy Policy</h2>
    <p>
      We collect your email and trading ID for the sole purpose of verifying your access to Digimun’s signal bot. Your data is not shared with third parties.
    </p>
    <p>
      We respect your privacy. All information is stored securely in our database. We do not track, sell, or misuse user data.
    </p>
  </div>
</body>
</html>
