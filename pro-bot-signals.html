<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digimun Pro Bot - Live Signals | Digimun Pro</title>
    <meta name="description" content="Live AI-powered trading signals from Digimun Pro Bot. Real-time signals with win rate tracking for binary options trading.">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="https://digimun.pro/pro-bot-signals">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-primary: #0a0f1a;
            --bg-secondary: #111827;
            --bg-card: #151f2e;
            --bg-card-hover: #1a2538;
            --accent: #00D4AA;
            --accent-dim: rgba(0, 212, 170, 0.1);
            --accent-glow: rgba(0, 212, 170, 0.3);
            --blue: #3b82f6;
            --blue-dim: rgba(59, 130, 246, 0.1);
            --gold: #f3ba2f;
            --text-primary: #ffffff;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --border: rgba(255, 255, 255, 0.08);
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            min-height: 100vh;
        }

        .page-bg {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: 
                radial-gradient(ellipse 80% 50% at 50% -20%, rgba(59, 130, 246, 0.15), transparent),
                radial-gradient(ellipse 60% 40% at 80% 60%, rgba(0, 212, 170, 0.08), transparent),
                var(--bg-primary);
            z-index: -1;
        }

        .container { max-width: 1200px; margin: 0 auto; padding: 0 20px; }

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--accent);
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
            padding: 12px 20px;
            background: var(--accent-dim);
            border: 1px solid var(--accent-glow);
            border-radius: 10px;
            transition: all 0.3s ease;
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 100;
        }

        .back-btn:hover { background: var(--accent-glow); }

        .header {
            padding: 100px 0 40px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #fff 0%, var(--accent) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
        }

        .header p {
            color: var(--text-secondary);
            font-size: 1rem;
        }

        .live-indicator {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 30px;
            padding: 12px 24px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 50px;
            width: fit-content;
            margin-left: auto;
            margin-right: auto;
        }

        .live-dot {
            width: 10px;
            height: 10px;
            background: var(--success);
            border-radius: 50%;
            animation: pulse 1.5s infinite;
            box-shadow: 0 0 10px var(--success);
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(0.9); }
        }

        .live-indicator span {
            font-size: 14px;
            color: var(--text-secondary);
        }

        #lastUpdate {
            color: var(--text-muted);
            font-size: 13px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 28px;
            text-align: center;
            transition: all 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-2px);
            border-color: var(--accent-glow);
            box-shadow: 0 8px 30px rgba(0, 212, 170, 0.1);
        }

        .stat-value {
            font-size: 2.8rem;
            font-weight: 800;
            color: var(--blue);
            margin-bottom: 5px;
        }

        .stat-value.win-rate {
            color: var(--success);
        }

        .stat-label {
            font-size: 0.9rem;
            color: var(--text-muted);
            font-weight: 500;
        }

        .top-pairs {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
            margin-bottom: 30px;
            padding: 20px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
        }

        .top-pairs-title {
            font-weight: 600;
            color: var(--gold);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .pair-chip {
            background: var(--bg-secondary);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.85rem;
            border: 1px solid var(--border);
            color: var(--text-secondary);
            transition: all 0.3s ease;
        }

        .pair-chip:hover {
            border-color: var(--accent-glow);
            color: var(--text-primary);
        }

        .signals-section {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 40px;
        }

        .section-title {
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--blue);
        }

        .signals-table {
            width: 100%;
            border-collapse: collapse;
        }

        .signals-table th {
            background: var(--bg-secondary);
            padding: 16px;
            text-align: left;
            color: var(--blue);
            font-weight: 600;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-bottom: 1px solid var(--border);
        }

        .signals-table th:first-child {
            border-radius: 10px 0 0 10px;
        }

        .signals-table th:last-child {
            border-radius: 0 10px 10px 0;
        }

        .signals-table td {
            padding: 16px;
            border-bottom: 1px solid var(--border);
            font-size: 0.95rem;
        }

        .signals-table tr:hover {
            background: var(--bg-card-hover);
        }

        .signals-table tr:last-child td {
            border-bottom: none;
        }

        .badge {
            padding: 6px 16px;
            border-radius: 20px;
            font-weight: 700;
            font-size: 0.8rem;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }

        .badge-call {
            background: rgba(16, 185, 129, 0.15);
            color: var(--success);
            border: 1px solid rgba(16, 185, 129, 0.3);
        }

        .badge-put {
            background: rgba(239, 68, 68, 0.15);
            color: var(--danger);
            border: 1px solid rgba(239, 68, 68, 0.3);
        }

        .result-win {
            color: var(--success);
            font-weight: 700;
        }

        .result-loss {
            color: var(--danger);
            font-weight: 700;
        }

        .result-pending {
            color: var(--warning);
            font-weight: 600;
        }

        .confidence-bar {
            width: 80px;
            height: 8px;
            background: var(--bg-secondary);
            border-radius: 4px;
            overflow: hidden;
        }

        .confidence-fill {
            height: 100%;
            border-radius: 4px;
            transition: width 0.3s ease;
        }

        .confidence-high { background: var(--success); }
        .confidence-medium { background: var(--warning); }
        .confidence-low { background: var(--danger); }

        .confidence-wrapper {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .confidence-wrapper span {
            font-weight: 600;
            color: var(--text-secondary);
            min-width: 40px;
        }

        .pair-name {
            font-weight: 700;
            color: var(--text-primary);
        }

        .signal-id {
            font-weight: 700;
            color: var(--accent);
        }

        .signal-time {
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .loading-row td {
            text-align: center;
            color: var(--text-muted);
            padding: 40px;
        }

        .error-row td {
            text-align: center;
            color: var(--danger);
            padding: 40px;
        }

        .no-signals td {
            text-align: center;
            color: var(--text-muted);
            padding: 40px;
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.8rem;
            }

            .signals-table {
                font-size: 0.85rem;
            }

            .signals-table th,
            .signals-table td {
                padding: 12px 8px;
            }

            .stat-value {
                font-size: 2rem;
            }

            .back-btn {
                padding: 10px 16px;
                font-size: 13px;
            }

            .badge {
                padding: 4px 10px;
                font-size: 0.75rem;
            }

            .confidence-bar {
                width: 60px;
            }

            .live-indicator {
                flex-wrap: wrap;
                text-align: center;
            }
        }

        @media (max-width: 600px) {
            .signals-table-wrapper {
                overflow-x: auto;
                -webkit-overflow-scrolling: touch;
            }

            .signals-table {
                min-width: 650px;
            }
        }
    </style>
</head>
<body>
    <div class="page-bg"></div>

    <a href="pro-bot-details" class="back-btn">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M15 8H1M8 15L1 8l7-7"/>
        </svg>
        Back to Pro Bot
    </a>

    <div class="container">
        <div class="header">
            <h1>Live Trading Signals</h1>
            <p>Real-time AI-powered signals from Digimun Pro Bot</p>
        </div>

        <div class="live-indicator">
            <div class="live-dot"></div>
            <span>Live Signals - Auto-updates every 30 seconds</span>
            <span id="lastUpdate"></span>
        </div>

        <div class="stats-grid" id="statsGrid">
            <div class="stat-card">
                <div class="stat-value" id="totalSignals">-</div>
                <div class="stat-label">Total Signals</div>
            </div>
            <div class="stat-card">
                <div class="stat-value win-rate" id="winRate">-</div>
                <div class="stat-label">Win Rate</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="todaySignals">-</div>
                <div class="stat-label">Today's Signals</div>
            </div>
            <div class="stat-card">
                <div class="stat-value win-rate" id="todayWinRate">-</div>
                <div class="stat-label">Today's Win Rate</div>
            </div>
        </div>

        <div id="topPairsContainer" class="top-pairs" style="display: none;">
            <span class="top-pairs-title">Top Pairs:</span>
            <div id="topPairs"></div>
        </div>

        <div class="signals-section">
            <h2 class="section-title">
                <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M3 3v18h18"/>
                    <path d="M18 9l-5 5-4-4-4 4"/>
                </svg>
                Recent Signals
            </h2>
            <div class="signals-table-wrapper">
                <table class="signals-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Time (PKT)</th>
                            <th>Pair</th>
                            <th>Direction</th>
                            <th>Confidence</th>
                            <th>Result</th>
                        </tr>
                    </thead>
                    <tbody id="signalsBody">
                        <tr class="loading-row"><td colspan="6">Loading signals...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        async function fetchStats() {
            try {
                const response = await fetch('/api/probot/stats');
                const data = await response.json();

                const stats = data.stats || {
                    overall: { total_signals: '-', win_rate: '-' },
                    today: { total_signals: '-', win_rate: '-' },
                    top_pairs: []
                };

                document.getElementById('totalSignals').textContent = stats.overall.total_signals || '-';
                document.getElementById('winRate').textContent = (stats.overall.win_rate || '-') + (stats.overall.win_rate ? '%' : '');
                document.getElementById('todaySignals').textContent = stats.today.total_signals || '-';
                document.getElementById('todayWinRate').textContent = (stats.today.win_rate || '-') + (stats.today.win_rate ? '%' : '');

                if (stats.top_pairs && stats.top_pairs.length > 0) {
                    const topPairsContainer = document.getElementById('topPairsContainer');
                    const topPairsEl = document.getElementById('topPairs');
                    topPairsContainer.style.display = 'flex';
                    topPairsEl.innerHTML = '';
                    
                    stats.top_pairs.forEach(pair => {
                        topPairsEl.innerHTML += `<div class="pair-chip">${pair.pair} (${pair.win_rate}% win)</div>`;
                    });
                }
            } catch (error) {
                console.error('Error fetching stats:', error);
            }
        }

        async function fetchSignals() {
            try {
                const response = await fetch('/api/probot/signals?limit=50');
                const data = await response.json();

                const tbody = document.getElementById('signalsBody');
                
                if (!data.success || !data.signals || data.signals.length === 0) {
                    const message = data.error === 'Bot API unavailable' 
                        ? 'Pro Bot API is not running. Please ensure the bot is deployed and running.'
                        : 'No signals available yet. Waiting for new signals...';
                    tbody.innerHTML = `<tr class="no-signals"><td colspan="6">${message}</td></tr>`;
                    document.getElementById('lastUpdate').textContent = 'Updated: ' + new Date().toLocaleTimeString();
                    return;
                }

                tbody.innerHTML = '';

                data.signals.forEach(signal => {
                        const directionClass = signal.direction === 'CALL' ? 'badge-call' : 'badge-put';
                        const directionEmoji = signal.direction === 'CALL' ? '↗' : '↘';

                        let resultClass = 'result-pending';
                        let resultText = '⏳ Pending';
                        if (signal.result === 'WIN') {
                            resultClass = 'result-win';
                            resultText = '✓ WIN';
                        } else if (signal.result === 'LOSS') {
                            resultClass = 'result-loss';
                            resultText = '✗ LOSS';
                        }

                        let confClass = 'confidence-high';
                        if (signal.confidence < 70) confClass = 'confidence-low';
                        else if (signal.confidence < 85) confClass = 'confidence-medium';

                        tbody.innerHTML += `
                            <tr>
                                <td><span class="signal-id">${signal.id}</span></td>
                                <td><span class="signal-time">${signal.time}</span></td>
                                <td><span class="pair-name">${signal.pair}</span></td>
                                <td><span class="badge ${directionClass}">${directionEmoji} ${signal.direction}</span></td>
                                <td>
                                    <div class="confidence-wrapper">
                                        <div class="confidence-bar">
                                            <div class="confidence-fill ${confClass}" style="width: ${signal.confidence}%"></div>
                                        </div>
                                        <span>${signal.confidence}%</span>
                                    </div>
                                </td>
                                <td class="${resultClass}">${resultText}</td>
                            </tr>
                        `;
                    });

                    document.getElementById('lastUpdate').textContent = 'Updated: ' + new Date().toLocaleTimeString();
            } catch (error) {
                console.error('Error fetching signals:', error);
                document.getElementById('signalsBody').innerHTML = '<tr class="error-row"><td colspan="6">Error loading signals. Please refresh the page.</td></tr>';
            }
        }

        fetchStats();
        fetchSignals();

        setInterval(() => {
            fetchStats();
            fetchSignals();
        }, 30000);
    </script>
</body>
</html>
